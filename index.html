    const candidates = generateGoalCandidates(actor);
    for (const candidate of candidates) {
      const path = findPath(actor, candidate.target);
      if (!path || path.length < 2) continue;
      actor.goal = {
        type: candidate.type,
        target: candidate.target,
        path: path.slice(1),
        utility: Math.round(candidate.utility),
        reason: candidate.reason,
        committedUntilTurn: game.turn + 2,
      };
      return actor.goal;
    }
    actor.goal = null;
    return null;
  }

  function isWithinHostileTerritory(hostile, x, y) {
    if (hostile.raider) return true;  // raiders roam freely toward the castle
    return Math.abs(x - hostile.originX) + Math.abs(y - hostile.originY) <= hostile.territory;
  }

  function hostileGoalIsValid(hostile) {
    const goal = hostile.goal;
    if (!goal || !goal.target) return false;
    if (hostile.x === goal.target.x && hostile.y === goal.target.y) return false;
    if (!goal.path || !goal.path.length) return false;
    return true;
  }

  function addHostileCandidate(candidates, hostile, type, x, y, utility, reason) {
    if (!isPassableForActor(x, y) || !isWithinHostileTerritory(hostile, x, y)) return;
    insertBoundedCandidate(candidates, { type, target: { x, y }, utility, reason }, 10);
  }

  function generateHostileGoalCandidates(hostile) {
    const candidates = [];
    // Raiders are single-minded: march on the castle. Guards intercept them en
    // route via the melee lock, so they need no other goals (and skipping the
    // territory/prowl scans keeps them cheap).
    if (hostile.raider) {
      insertBoundedCandidate(candidates, {
        type: 'raid', target: { x: game.castle.x, y: game.castle.y }, utility: 1000, reason: 'the castle',
      }, 4);
      return candidates;
    }
    for (const actor of game.actors) {
      if (!actor.alive) continue;
      const dx = Math.abs(actor.x - hostile.x);
      const dy = Math.abs(actor.y - hostile.y);
      const d = Math.max(dx, dy);
      if (d > 12 || !isWithinHostileTerritory(hostile, actor.x, actor.y)) continue;
      let utility = 120 - d * 9 + hostile.threat * 8 - actor.hp * 5;
      if (hostile.kind === 'wolf' && actor.hp < actor.maxHp) utility += 35;
      if (hostile.kind === 'bandit' && actor.id === 'guard') utility -= 45;
      if (hostile.kind === 'boar' && d > 3) utility -= 70;
      if (hostile.kind === 'bear' && d > 4) utility -= 55;
      addHostileCandidate(candidates, hostile, 'stalk', actor.x, actor.y, utility, actor.name);
    }

    // Evil enemies march on the settlement to raid it (animals never do).
    if (isEvil(hostile) && isWithinHostileTerritory(hostile, game.castle.x, game.castle.y)) {
      const d = Math.abs(game.castle.x - hostile.x) + Math.abs(game.castle.y - hostile.y);
      addHostileCandidate(candidates, hostile, 'raid', game.castle.x, game.castle.y, 100 + hostile.threat * 6 - d * 1.4, 'the castle');
    }

    const template = hostileTemplate(hostile.kind);
    const minX = Math.max(1, hostile.originX - hostile.territory);
    const maxX = Math.min(COLS - 2, hostile.originX + hostile.territory);
    const minY = Math.max(1, hostile.originY - hostile.territory);
    const maxY = Math.min(ROWS - 2, hostile.originY + hostile.territory);
    for (let y = minY; y <= maxY; y++) {
      for (let x = minX; x <= maxX; x++) {
        if (!isWithinHostileTerritory(hostile, x, y)) continue;
        const tKey = map.tiles[y][x];
        let utility = templatePrefers(template, tKey) ? 62 : 18;
        if (hostile.kind === 'bandit' && ROADS.has(tKey)) utility += 38;
        if (hostile.kind === 'goblin' && tKey === 'RUIN') utility += 50;
        utility -= Math.abs(x - hostile.x) + Math.abs(y - hostile.y);
        utility += ((map.seed ^ Math.imul(game.subTurnSeq + x + 3, 2246822519) ^ Math.imul(y + hostile.id.length, 3266489917)) >>> 0) / 0xffffffff;
        addHostileCandidate(candidates, hostile, 'prowl', x, y, utility, T[tKey].name);
      }
    }
    return candidates;
  }

  function chooseHostileGoal(hostile) {
    if (hostileGoalIsValid(hostile)) return hostile.goal;
    const candidates = generateHostileGoalCandidates(hostile);
    for (const candidate of candidates) {
      const path = findPath(hostile, candidate.target);
      if (!path || path.length < 2) continue;
      hostile.goal = {
        type: candidate.type,
        target: candidate.target,
        path: path.slice(1),
        utility: Math.round(candidate.utility),
        reason: candidate.reason,
      };
      return hostile.goal;
    }
    hostile.goal = null;
    return null;
  }

  // ---- d20 combat -------------------------------------------------------
  // One PRNG per turn (seeded by map seed + turn), drawn sequentially so each
  // attack/damage roll is independent yet fully reproducible. A fight is one
  // round per turn; HP pools persist across turns, so a melee plays out over
  // several turns until one side dies (or, once implemented, flees).
  // Seeded by the monotonic sub-turn counter (not the big-turn number) so each
  // of a big turn's sub-turns rolls a fresh, distinct dice sequence — yet stays
  // fully reproducible for a given seed.
  function makeCombatRng() {
    return mulberry32((map.seed ^ Math.imul(game.subTurnSeq + 1, 2654435761)) >>> 0);
  }
  function turnTag() {
    return `T${String(game.turn).padStart(2, '0')}`;
  }
  function rollD20(rng, mode) {
    // mode > 0 advantage (take higher of 2), < 0 disadvantage (take lower).
    const a = 1 + Math.floor(rng() * 20);
    if (!mode) return a;
    const b = 1 + Math.floor(rng() * 20);
    return mode > 0 ? Math.max(a, b) : Math.min(a, b);
  }
  function rollDamage(rng, dmg) {
    let total = dmg.mod || 0;
    for (let i = 0; i < dmg.n; i++) total += 1 + Math.floor(rng() * dmg.d);
    return Math.max(1, total);
  }

  // True when a unit is on terrain that favours its fighting style — grants
  // advantage on its attack rolls. Replaces the old additive terrain bonuses.
  function meleeTerrainEdge(unit, tKey) {
    if (unit.kind) {
      if ((unit.kind === 'wolf' || unit.kind === 'boar') && WOODS.has(tKey)) return true;
      if (unit.kind === 'bear' && (tKey === 'DEEPWOOD' || tKey === 'HILL' || tKey === 'MOUNTAIN')) return true;
      if (unit.kind === 'bandit' && ROADS.has(tKey)) return true;
      if (unit.kind === 'goblin' && (tKey === 'RUIN' || tKey === 'DEEPWOOD')) return true;
      return false;
    }
    if (unit.id === 'guard' && ROADS.has(tKey)) return true;
    if (unit.id === 'hunter' && WOODS.has(tKey)) return true;
    if (tKey === 'CASTLE') return true;
    return false;
  }

  // Resolve a single attack. `bias` adds to the advantage mode (e.g. +1 when
  // the defender is fleeing and exposes its back). Returns a detail object
  // {dmg, roll, total, mode, hit, crit} for the battle log; mutates defender
  // hp/alive on a hit.
  function meleeAttack(attacker, defender, rng, bias) {
    const tKey = map.tiles[attacker.y][attacker.x];
    let mode = bias || 0;
    if (meleeTerrainEdge(attacker, tKey)) mode += 1;
    mode = mode > 0 ? 1 : (mode < 0 ? -1 : 0);
    const roll = rollD20(rng, mode);
    const crit = roll === 20;
    const hit = crit || (roll !== 1 && roll + attacker.atk >= defender.ac);
    let dmg = 0;
    if (hit) {
      dmg = rollDamage(rng, attacker.dmg);
      if (crit) dmg += rollDamage(rng, attacker.dmg); // crit: extra dice
      defender.hp -= dmg;
      if (defender.hp <= 0) {
        defender.hp = 0;
        defender.alive = false;
      }
    }
    return { dmg, roll, total: roll + attacker.atk, mode, hit, crit };
  }

  // One line of the detailed battle log describing a single swing.
  function logAttackLine(battleLog, attacker, defender, r) {
    const adv = r.mode > 0 ? ' adv' : (r.mode < 0 ? ' dis' : '');
    if (!r.hit) {
      battleLog.push(`  ${attacker.name} missed ${defender.name} (d${r.roll}${adv}).`);
      return;
    }
    const tag = r.crit ? 'CRIT ' : '';
    const fate = defender.alive ? `${defender.name} ${defender.hp}/${defender.maxHp}` : `${defender.name} DOWN`;
    battleLog.push(`  ${attacker.name} ${tag}hit ${defender.name} (d${r.roll}${adv}) ${r.dmg} dmg, ${fate}.`);
  }

  function rewardForKill(actor, hostile, events) {
    actor.xp += 1;
    game.coin += Math.max(2, Math.round(hostile.threat * 3));
    events.push(`${actor.name} killed ${hostile.name}.`);
  }

  function pushCombat(combats, actor, hostile) {
    combats.push({
      actor,
      hostile,
      actorX: actor.x,
      actorY: actor.y,
      hostileX: hostile.x,
      hostileY: hostile.y,
    });
  }

  // At most this many hostiles can pile onto one actor in a single round —
  // models how many bodies physically fit around a tile, and caps burst
  // damage so a swarm wounds rather than instantly deletes.
  const PACK_CAP = 4;

  // One combat round per actor: the actor strikes its most dangerous adjacent
  // foe, then the surrounding pack strikes back. Two or more flanking hostiles
  // attack with advantage; a fleeing actor also grants its attackers advantage.
  function resolveActorMelee(actor, adj, rng, events, combats, battleLog) {
    // Actor focus-fires the toughest adjacent hostile.
    let target = adj[0];
    for (let k = 1; k < adj.length; k++) {
      if (adj[k].threat > target.threat) target = adj[k];
    }
    const foes = adj.map(h => h.name).join(', ');
    battleLog.push(`${turnTag()} ${actor.name}${actor.fleeing ? ' (fleeing)' : ''} vs ${foes}`);
    pushCombat(combats, actor, target);
    const strike = meleeAttack(actor, target, rng, 0);
    logAttackLine(battleLog, actor, target, strike);
    if (!target.alive) rewardForKill(actor, target, events);
    else if (strike.dmg > 0) events.push(`${actor.name} wounded ${target.name} (${strike.dmg}).`);

    // Pack riposte. Flanking advantage when 2+ hostiles surround the actor;
    // fleeing exposes the actor's back for further advantage.
    const bias = (adj.length >= 2 ? 1 : 0) + (actor.fleeing ? 1 : 0);
    let attackers = 0;
    let totalTaken = 0;
    let lastAttacker = null;
    for (let k = 0; k < adj.length && attackers < PACK_CAP; k++) {
      const h = adj[k];
      if (!h.alive) continue; // may have just been killed by the actor's strike
      if (h !== target) pushCombat(combats, actor, h);
      const swing = meleeAttack(h, actor, rng, bias);
      logAttackLine(battleLog, h, actor, swing);
      totalTaken += swing.dmg;
      attackers++;
      lastAttacker = h;
      if (!actor.alive) {
        events.push(`${actor.name} died fighting ${h.name}.`);
        return;
      }
    }
    if (totalTaken > 0) {
      const who = attackers > 1 ? `${attackers} attackers` : lastAttacker.name;
      events.push(`${actor.name} was hurt by ${who} (${totalTaken}).`);
    }
  }

  function resolveCombats(events, combats, battleLog) {
    if (!game.hostiles.length) return;
    const rng = makeCombatRng();
    for (let ai = 0; ai < game.actors.length; ai++) {
      const actor = game.actors[ai];
      if (!actor.alive) continue;
      // Gather every adjacent living hostile — the whole pack engages at once.
      const adj = [];
      for (let hi = 0; hi < game.hostiles.length; hi++) {
        const h = game.hostiles[hi];
        if (!h.alive) continue;
        if (Math.max(Math.abs(actor.x - h.x), Math.abs(actor.y - h.y)) <= 1) adj.push(h);
      }
      if (adj.length) resolveActorMelee(actor, adj, rng, events, combats, battleLog);
    }
  }

  // Melee lock: an adjacent living enemy pins a unit in place (zone of
  // control), so a fight stays joined across turns instead of units sliding
  // past each other in a single round. Cheap linear scans (≤4 actors, and only
  // awake hostiles are ever queried).
  function adjacentLivingHostile(actor) {
    for (let i = 0; i < game.hostiles.length; i++) {
      const h = game.hostiles[i];
      if (!h.alive) continue;
      if (Math.max(Math.abs(actor.x - h.x), Math.abs(actor.y - h.y)) <= 1) return h;
    }
    return null;
  }
  function adjacentLivingActor(hostile) {
    for (let i = 0; i < game.actors.length; i++) {
      const a = game.actors[i];
      if (!a.alive) continue;
      if (Math.max(Math.abs(hostile.x - a.x), Math.abs(hostile.y - a.y)) <= 1) return a;
    }
    return null;
  }
  function adjacentLivingHostiles(actor) {
    const list = [];
    for (let i = 0; i < game.hostiles.length; i++) {
      const h = game.hostiles[i];
      if (!h.alive) continue;
      if (Math.max(Math.abs(actor.x - h.x), Math.abs(actor.y - h.y)) <= 1) list.push(h);
    }
    return list;
  }

  // ---- threat perception ------------------------------------------------
  // Rough combat strength of a unit, used to decide fight-or-flee. Average
  // damage of n d(d) is n*(d+1)/2; add attack accuracy and a slice of HP.
  function unitPower(u) {
    const avgDmg = u.dmg.n * (u.dmg.d + 1) / 2 + (u.dmg.mod || 0);
    return avgDmg + u.atk * 0.6 + u.hp * 0.35;
  }

  const DANGER_RADIUS = 6;
  const DANGER_AVERSION = 4; // pathfinding penalty per unit of danger (non-guard)

  // Per-turn danger field: each hostile the team can currently see stamps a
  // linear falloff of its threat into nearby cells. Actors route around it and
  // weigh it when picking goals; guards ignore it (they hunt instead). Bounded
  // stamping keeps this ~O(hostiles * radius^2), a few thousand ops per turn.
  function buildDangerMap() {
    const danger = game.danger;
    danger.fill(0);
    for (let i = 0; i < game.hostiles.length; i++) {
      const h = game.hostiles[i];
      if (!h.alive || !game.visible[idx(h.x, h.y)]) continue;
      const weight = unitPower(h);
      const minY = Math.max(0, h.y - DANGER_RADIUS);
      const maxY = Math.min(ROWS - 1, h.y + DANGER_RADIUS);
      const minX = Math.max(0, h.x - DANGER_RADIUS);
      const maxX = Math.min(COLS - 1, h.x + DANGER_RADIUS);
      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          const d = Math.max(Math.abs(x - h.x), Math.abs(y - h.y));
          if (d > DANGER_RADIUS) continue;
          danger[idx(x, y)] += weight * (1 - d / DANGER_RADIUS);
        }
      }
    }
  }

  // Decide whether an actor should break off and run. Flee when badly wounded,
  // or when the surrounding pack clearly outmatches the actor. Guards hold
  // ground far more stubbornly than the squishier roles.
  function shouldFlee(actor, threats) {
    if (!threats.length) return false;
    if (actor.role === 'guard') return false;  // garrison holds the line
    let enemyPower = 0;
    for (let i = 0; i < threats.length; i++) enemyPower += unitPower(threats[i]);
    // Scale the actor's effective strength by remaining HP fraction.
    const self = unitPower(actor) * (0.4 + 0.6 * (actor.hp / actor.maxHp));
    const stubbornness = (actor.role === 'guard' || actor.role === 'fighter') ? 1.8
      : actor.role === 'monster' ? 1.5 : 0.9;  // rangers/rogues flee readily
    if (actor.hp <= actor.maxHp * 0.3) return true;
    return enemyPower > self * stubbornness;
  }

  // Retreat toward the castle (the heal/resupply haven). Recomputed each turn
  // because the danger field shifts; danger-aware pathfinding routes the
  // escape around other hostiles where possible. Returns null if cornered
  // (no path home), in which case the caller falls back to standing and
  // fighting rather than taking the fleeing penalty for nothing.
  function ensureFleeGoal(actor) {
    const path = findPath(actor, game.castle);
    if (path && path.length >= 2) {
      actor.goal = {
        type: 'flee',
        target: { ...game.castle },
        path: path.slice(1),
        utility: 999,
        reason: 'fleeing',
        committedUntilTurn: game.turn + 1,
      };
      return actor.goal;
    }
    return null;
  }

  function resolveGoalArrival(actor, events) {
    const goal = actor.goal;
    if (!goal || actor.x !== goal.target.x || actor.y !== goal.target.y) return;
    const tileIndex = idx(actor.x, actor.y);
    const tile = map.tiles[actor.y][actor.x];

    if (goal.type === 'resupply' || goal.type === 'rest') {
      actor.supply = actor.maxSupply;
      actor.hp = actor.maxHp;
    } else if (goal.type === 'flee') {
      // Reached the castle alive — recover and shake off the pursuit.
      actor.supply = actor.maxSupply;
      actor.hp = actor.maxHp;
      actor.fleeing = false;
      events.push(`${actor.name} escaped to the castle.`);
    }

    actor.goal = null;
  }

  const SUBTURNS = 4;

  // The strategic beat. Once per big turn: cycle the season, let the Steward
  // act, tick the economy, then resolve SUBTURNS sub-turns of movement/combat.
  // `events` accumulates the digest across all sub-turns.
  function bigTurnEconomy(events) {
    game.turn += 1;
    // Seasons turn over every 10-20 big turns; the opening is summer.
    if (game.turn > game.seasonEnds) {
      game.season = game.season === 'summer' ? 'winter' : 'summer';
      game.seasonCount++;
      game.seasonEnds += rollSeasonLength(game.seasonCount);
      events.push(game.season === 'winter' ? 'Winter closes in over the marches.' : 'Spring thaws the marches.');
    }
    // Clear the fallen so the hostile list stays bounded across raid waves.
    game.hostiles = game.hostiles.filter(h => h.alive);
    runSteward();
    economyTick(events);
    maintainGarrison(events);
    maybeRaid(events);
  }

  // Resolved after a big turn's sub-turns: raiders at the gates harm the city.
  function endBigTurn(events) {
    resolveSiege(events);
  }

  // One sub-turn: movement + combat for every unit. No economy here.
  function computeTurnPlan(options = null) {
    if (!game || viewMode !== 'world') return;
    game.subTurnSeq++;  // advance the per-sub-turn RNG stream
    const turnStartMs = game.simStats ? perfNow() : 0;
    const recordMoves = !options || options.recordMoves !== false;
    const events = (options && options.events) || [];
    const moves = [];
    const hostileMoves = [];
    const combats = [];
    const battleLog = [];
    buildDangerMap();
    for (const actor of game.actors) {
      if (!actor.alive) continue;
      const startX = actor.x;
      const startY = actor.y;
      const path = recordMoves ? [{ x: actor.x, y: actor.y }] : null;
      // Fight-or-flight: with hostiles in reach, the actor either stands and
      // fights (melee lock — combat resolves in the combat phase) or, if
      // outmatched, breaks off and runs for the castle. Fleeing past adjacent
      // foes exposes its back (attackers get advantage, wired in combat).
      const threats = adjacentLivingHostiles(actor);
      let fleeing = threats.length > 0 && shouldFlee(actor, threats);
      let goal;
      if (fleeing) {
        goal = ensureFleeGoal(actor);
        if (!goal) fleeing = false; // cornered: nowhere to run, so hold ground
      }
      if (!fleeing) {
        goal = threats.length ? actor.goal : chooseGoal(actor); // pinned stands
      }
      actor.fleeing = fleeing;
      const pinned = threats.length > 0 && !fleeing;
      let movementBudget = pinned ? 0 : actor.steps;
      let spentMovement = 0;
      while (movementBudget > 0) {
        if (!actor.goal || !actor.goal.path || !actor.goal.path.length) break;
        const next = actor.goal.path.shift();
        if (!isPassableForActor(next.x, next.y)) {
          actor.goal = null;
          break;
        }
        const moveCost = stepCostForActor(actor, { x: actor.x, y: actor.y }, next, false);
        if (moveCost > movementBudget) {
          actor.goal.path.unshift(next);
          break;
        }
        actor.x = next.x;
        actor.y = next.y;
        movementBudget -= moveCost;
        spentMovement += moveCost;
        if (recordMoves) path.push({ x: actor.x, y: actor.y });
      }
      if (actor.x !== game.castle.x || actor.y !== game.castle.y) {
        actor.supply = Math.max(0, actor.supply - 1);
      }
      if (actor.x !== startX || actor.y !== startY) {
        const goalText = goal ? `${goal.type} goal` : actor.role;
        events.push(`${actor.name} followed ${goalText} to ${actor.x},${actor.y} (${spentMovement.toFixed(1)}/${actor.steps.toFixed(1)} mp).`);
      }
      // A fleeing actor that shook every adjacent foe (without reaching the
      // castle, which logs its own escape) broke contact this turn.
      if (fleeing && (actor.x !== game.castle.x || actor.y !== game.castle.y)
          && adjacentLivingHostiles(actor).length === 0) {
        events.push(`${actor.name} broke off and fled.`);
      }
      const tileIndex = idx(actor.x, actor.y);
      const tile = map.tiles[actor.y][actor.x];
      if (tile === 'RUIN') game.discoveredRuins.add(tileIndex);
      resolveGoalArrival(actor, events);
      if (recordMoves) {
        moves.push({
          actor,
          path,
          startHp: actor.hp,
          startAlive: true,
          spentMovement,
          finalHp: actor.hp,
          finalAlive: actor.alive,
        });
      }
    }
    for (const hostile of game.hostiles) {
      if (!hostile.alive) continue;
      // Sleep optimisation: hostiles outside engagement range of the castle or
      // any living villager skip pathfinding and movement entirely. On wake-up,
      // clear the stale goal so it re-evaluates against current positions.
      if (!hostileIsAwake(hostile)) {
        hostile.goal = null;
        if (recordMoves) hostileMoves.push({
          hostile,
          path: [{ x: hostile.x, y: hostile.y }],
          startHp: hostile.hp, startAlive: true,
          spentMovement: 0, finalHp: hostile.hp, finalAlive: true,
        });
        continue;
      }
      const path = recordMoves ? [{ x: hostile.x, y: hostile.y }] : null;
      // Melee lock: stay and fight an adjacent actor rather than re-pathing.
      const pinned = adjacentLivingActor(hostile);
      if (!pinned) chooseHostileGoal(hostile);
      let movementBudget = pinned ? 0 : hostile.steps;
      let spentMovement = 0;
      while (movementBudget > 0) {
        if (!hostile.goal || !hostile.goal.path || !hostile.goal.path.length) break;
        const next = hostile.goal.path.shift();
        if (!isPassableForActor(next.x, next.y) || !isWithinHostileTerritory(hostile, next.x, next.y)) {
          hostile.goal = null;
          break;
        }
        const moveCost = stepCostForActor(hostile, { x: hostile.x, y: hostile.y }, next, false);
        if (moveCost > movementBudget) {
          hostile.goal.path.unshift(next);
          break;
        }
        hostile.x = next.x;
        hostile.y = next.y;
        movementBudget -= moveCost;
        spentMovement += moveCost;
        if (recordMoves) path.push({ x: hostile.x, y: hostile.y });
      }
      if (hostile.goal && hostile.x === hostile.goal.target.x && hostile.y === hostile.goal.target.y) {
        hostile.goal = null;
      }
      if (recordMoves) {
        hostileMoves.push({
          hostile,
          path,
          startHp: hostile.hp,
          startAlive: true,
          spentMovement,
          finalHp: hostile.hp,
          finalAlive: hostile.alive,
        });
      }
    }
    if (!recordMoves) {
      // Reveal destinations before combat deaths, matching the animated turn flow.
      updateVisibility();
    }
    resolveCombats(events, combats, battleLog);
    // Newest engagements on top; keep a bounded scrollback for the report.
    if (battleLog.length) {
      game.battleLog.unshift(...battleLog);
      game.battleLog = game.battleLog.slice(0, 80);
    }
    if (recordMoves) {
      for (const move of moves) {
        move.finalHp = move.actor.hp;
        move.finalAlive = move.actor.alive;
        move.actor.hp = move.startHp;
        move.actor.alive = move.startAlive;
      }
      for (const move of hostileMoves) {
        move.finalHp = move.hostile.hp;
        move.finalAlive = move.hostile.alive;
        move.hostile.hp = move.startHp;
        move.hostile.alive = move.startAlive;
      }
      updateVisibility();
    }
    game.log = events.length ? events[0] : 'The marches are quiet.';
    if (game.simStats) {
      game.simStats.turns++;
      game.simStats.turnMs += perfNow() - turnStartMs;
    }
    return { events, moves, hostileMoves, combats, battleLog };
  }

  function isMajorEvent(event) {
    return /hurt|died|killed|fighting|searched old ruins/i.test(event);
  }

  function logTurnReport(turnLabel, plan) {
    const actorLines = game.actors.map(actor => {
      const state = actor.alive ? `HP ${actor.hp}, supply ${actor.supply}` : 'dead';
      const goal = actor.goal ? `${actor.goal.type} ${actor.goal.target.x},${actor.goal.target.y}` : 'idle';
      return `${actor.name}: ${actor.x},${actor.y}; ${state}; goal ${goal}`;
    });
    const hostileLines = game.hostiles.map(hostile => {
      const state = hostile.alive ? `HP ${hostile.hp}` : 'dead';
      const goal = hostile.goal ? `${hostile.goal.type} ${hostile.goal.target.x},${hostile.goal.target.y}` : 'idle';
      return `${hostile.name}: ${hostile.x},${hostile.y}; ${state}; goal ${goal}`;
    });
    const eventLines = plan.events.length ? plan.events : ['No major events.'];
    console.groupCollapsed(`[LoR] ${turnLabel} report`);
    console.log(['Events:', ...eventLines.map(event => `- ${event}`), 'Actors:', ...actorLines.map(line => `- ${line}`), 'Hostiles:', ...hostileLines.map(line => `- ${line}`)].join('\n'));
    console.groupEnd();
  }

  // Apply one resolved sub-turn to the live state (final positions, HP,
  // deaths) and refresh visibility. No reporting — the big-turn controller
  // handles the digest once all sub-turns are done.
  function finishSubTurn(plan) {
    fightFlashCells = null;
    for (const move of plan.moves) {
      const end = move.path[move.path.length - 1];
      move.actor.x = end.x;
      move.actor.y = end.y;
      move.actor.hp = move.finalHp;
      move.actor.alive = move.finalAlive;
    }
    for (const move of plan.hostileMoves) {
      const end = move.path[move.path.length - 1];
      move.hostile.x = end.x;
      move.hostile.y = end.y;
      move.hostile.hp = move.finalHp;
      move.hostile.alive = move.finalAlive;
    }
    updateVisibility();
  }

  // End of a big turn: digest the accumulated sub-turn events into the report
  // log and hand control back to the player (no auto-advance).
  function finishBigTurn(digest) {
    const turnLabel = `T${String(game.turn).padStart(2, '0')}`;
    const major = digest.filter(isMajorEvent);
    const summary = major.length ? major[0]
      : (digest.length ? `${digest.length} actions resolved.` : 'The marches are quiet.');
    game.log = `${turnLabel} ${summary}`;
    const lines = [`${turnLabel} ${summary}`, ...major.slice(1, 5).map(e => `   ${e}`)];
    game.reports.unshift(...lines);
    game.reports = game.reports.slice(0, 24);
    highlightedTile = null;
    isAnimatingTurn = false;
    viewMode = major.length ? 'report' : 'world';  // surface notable turns
    render(map);
  }

  function setFightFlashCells(combats, reverseOrder) {
    const cells = [];
    for (const combat of combats) {
      if (reverseOrder) {
        cells.push({ x: combat.hostileX, y: combat.hostileY, glyph: combat.hostile.glyph });
        cells.push({ x: combat.actorX, y: combat.actorY, glyph: combat.actor.glyph });
      } else {
        cells.push({ x: combat.actorX, y: combat.actorY, glyph: combat.actor.glyph });
        cells.push({ x: combat.hostileX, y: combat.hostileY, glyph: combat.hostile.glyph });
      }
    }
    fightFlashCells = cells;
  }

  function flashCombats(plan, done) {
    if (!plan.combats.length) {
      done();
      return;
    }
    let phase = 0;
    const flashTick = () => {
      if (phase >= 4) {
        fightFlashCells = null;
        render(map);
        done();
        return;
      }
      if (phase & 1) fightFlashCells = null;
      else setFightFlashCells(plan.combats, phase === 2);
      render(map);
      phase += 1;
      window.setTimeout(flashTick, 80);
    };
    flashTick();
  }

  // Animate one sub-turn. Units move ONE AT A TIME, in the exact order they
  // were resolved in computeTurnPlan (friendly actors first, then hostiles) —
  // so the playback mirrors the actual turn order rather than everyone sliding
  // at once. Per-tile speed scales with how many tiles must be covered so a
  // crowded raid turn stays snappy.
  function animateTurn(plan, onDone) {
    viewMode = 'world';
    highlightedTile = null;
    const allMoves = plan.moves.concat(plan.hostileMoves);
    const finish = () => { finishSubTurn(plan); if (onDone) onDone(); };
    // Snap every unit to its starting cell so the board shows the pre-move state.
    for (const move of allMoves) {
      const unit = move.actor || move.hostile;
      unit.x = move.path[0].x;
      unit.y = move.path[0].y;
    }
    updateVisibility();
    render(map);
    // Only units that actually travel are animated; the rest already sit put.
    const movers = allMoves.filter(move => move.path.length > 1);
    if (movers.length === 0) { flashCombats(plan, finish); return; }
    const totalTiles = movers.reduce((sum, m) => sum + m.path.length - 1, 0);
    const BUDGET_MS = 2600; // rough wall-clock target for the whole sub-turn
    const STEP_MS = Math.max(30, Math.min(95, Math.floor(BUDGET_MS / Math.max(1, totalTiles))));
    const GAP_MS = Math.max(18, Math.floor(STEP_MS * 0.55)); // beat as the turn passes on
    let mi = 0;
    const animateMover = () => {
      if (mi >= movers.length) { flashCombats(plan, finish); return; }
      const move = movers[mi];
      const unit = move.actor || move.hostile;
      let frame = 0;
      const tick = () => {
        frame += 1;
        const pos = move.path[Math.min(frame, move.path.length - 1)];
        unit.x = pos.x;
        unit.y = pos.y;
        updateVisibility();
        render(map);
        if (frame < move.path.length - 1) {
          window.setTimeout(tick, STEP_MS);
        } else {
          mi += 1;
          window.setTimeout(animateMover, GAP_MS);
        }
      };
      window.setTimeout(tick, STEP_MS);
    };
    animateMover();
  }

  // The player takes one big turn: economy ticks, then SUBTURNS sub-turns
  // resolve and animate in sequence. Control returns afterward — no auto-advance.
  function advanceTurn() {
    if (!game || viewMode !== 'world' || isAnimatingTurn) return;
    isAnimatingTurn = true;
    const digest = [];
    bigTurnEconomy(digest);
    const runSub = (i) => {
      if (i >= SUBTURNS) { endBigTurn(digest); finishBigTurn(digest); return; }
      const plan = computeTurnPlan({ recordMoves: true });
      digest.push(...plan.events);
      animateTurn(plan, () => runSub(i + 1));
    };
    runSub(0);
  }

  function ensureGridCells() {
    const count = viewCols * viewRows;
    mapEl.style.setProperty('--view-cols', viewCols);
    if (gridCells.length === count) return;

    gridCells = [];
    gridCellState = [];
    edgeActorCells = new Int16Array(count);
    mapEl.textContent = '';
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      gridCells.push(s);
      gridCellState.push({ ch: '', fg: '', bg: '', x: null, y: null, t: '', view: '' });
      frag.appendChild(s);
    }
    mapEl.appendChild(frag);
  }

  function setGridCell(i, ch, fg, bg, meta = null) {
    const s = gridCells[i];
    const state = gridCellState[i];
    if (state.ch !== ch) {
      s.textContent = ch;
      state.ch = ch;
    }
    if (state.fg !== fg) {
      s.style.color = fg;
      state.fg = fg;
    }
    if (state.bg !== bg) {
      s.style.background = bg;
      state.bg = bg;
    }
    const x = meta && meta.x !== undefined ? meta.x : null;
    const y = meta && meta.y !== undefined ? meta.y : null;
    const t = meta && meta.t !== undefined ? meta.t : '';
    const view = meta && meta.view !== undefined ? meta.view : '';
    if (state.x !== x) {
      if (x === null) s.removeAttribute('data-x');
      else s.dataset.x = x;
      state.x = x;
    }
    if (state.y !== y) {
      if (y === null) s.removeAttribute('data-y');
      else s.dataset.y = y;
      state.y = y;
    }
    if (state.t !== t) {
      if (!t) s.removeAttribute('data-t');
      else s.dataset.t = t;
      state.t = t;
    }
    if (state.view !== view) {
      if (!view) s.removeAttribute('data-view');
      else s.dataset.view = view;
      state.view = view;
    }
  }

  function setTextRow(row, text, fg, bg) {
    for (let gx = 0; gx < viewCols; gx++) {
      setGridCell(row * viewCols + gx, text[gx] || ' ', fg, bg, { view: viewMode });
    }
  }

  function arrowForVector(dx, dy) {
    if (dy < 0) return dx < 0 ? '↖' : (dx > 0 ? '↗' : '↑');
    if (dy > 0) return dx < 0 ? '↙' : (dx > 0 ? '↘' : '↓');
    return dx < 0 ? '←' : '→';
  }

  function renderFightFlashOverlay(currentMap) {
    if (!fightFlashCells || !fightFlashCells.length) return;
    const mapRows = visibleWorldRows();
    for (let i = 0; i < fightFlashCells.length; i++) {
      const cell = fightFlashCells[i];
      const gx = cell.x - cameraX;
      const gy = cell.y - cameraY;
      if (gx < 0 || gy < 0 || gx >= viewCols || gy >= mapRows) continue;
      if (!game.visible[idx(cell.x, cell.y)]) continue;
      setGridCell(
        (gy + TOP_BAR_ROWS) * viewCols + gx,
        cell.glyph,
        '#ff3b30',
        '#3a0909',
        { x: cell.x, y: cell.y, t: currentMap.tiles[cell.y][cell.x], view: 'world' }
      );
    }
  }

  function renderWorld(currentMap) {
    ensureGridCells();
    edgeActorCells.fill(0);
    const mapRows = visibleWorldRows();
    const resourceBar = game
      ? `Pop${game.population}/${housingCap()} C${game.coin} F${Math.floor(game.food)} ${game.season === 'winter' ? '❄' : '☀'}   NEXT`
      : 'COIN  FOOD';
    const statusBar = describeTile(highlightedTile);

    setTextRow(0, ` ${resourceBar}`, '#11130f', '#d6bb7a');
    setTextRow(viewRows - 1, ` ${statusBar}`, '#d8d2bf', '#1b2220');

    for (let gy = 0; gy < mapRows; gy++) {
      for (let gx = 0; gx < viewCols; gx++) {
        const screenY = gy + TOP_BAR_ROWS;
        const cellIndex = screenY * viewCols + gx;
        const x = cameraX + gx;
        const y = cameraY + gy;
        const tileIndex = idx(x, y);
        if (!game || !game.discovered[tileIndex]) {
          setGridCell(cellIndex, '?', '#20241f', '#030504', { x, y, t: 'UNKNOWN', view: 'world' });
          continue;
        }
        const tKey = currentMap.tiles[y][x];
        const def = tilePalette(tKey);
        const isHighlighted = highlightedTile && highlightedTile.x === x && highlightedTile.y === y;
        const isVisible = game.visible[tileIndex];
        const actor = isVisible ? actorAt(x, y) : null;
        const hostile = isVisible ? hostileAt(x, y) : null;
        const ch = actor ? actor.glyph : (hostile ? hostile.glyph : glyphFor(tKey, x, y, currentMap.seed ^ 0xC0FFEE));
        const fg = actor ? actor.fg : (hostile ? hostile.fg : (isHighlighted ? '#fff6cb' : def.fg));
        const bg = isHighlighted ? '#6a4a1a' : (isVisible ? def.bg : '#151916');
        setGridCell(
          cellIndex,
          ch,
          fg,
          bg,
          { x, y, t: tKey, view: 'world' }
        );
      }
    }

    if (!game) return;
    renderFightFlashOverlay(currentMap);
    for (let i = 0; i < game.actors.length; i++) {
      const actor = game.actors[i];
      if (!actor.alive) continue;
      const dx = actor.x - cameraX;
      const dy = actor.y - cameraY;
      if (dx >= 0 && dx < viewCols && dy >= 0 && dy < mapRows) continue;
      const gx = Math.max(0, Math.min(viewCols - 1, dx));
      const gy = Math.max(0, Math.min(mapRows - 1, dy));
      const edgeWorldX = cameraX + gx;
      const edgeWorldY = cameraY + gy;
      if (actorAt(edgeWorldX, edgeWorldY)) continue;
      const screenY = gy + TOP_BAR_ROWS;
      const cellIndex = screenY * viewCols + gx;
      if (edgeActorCells[cellIndex]) continue;
      edgeActorCells[cellIndex] = i + 1;
      setGridCell(
        cellIndex,
        arrowForVector(dx, dy),
        actor.fg,
        '#2a2414',
        { x: edgeWorldX, y: edgeWorldY, t: currentMap.tiles[edgeWorldY][edgeWorldX], view: 'world' }
      );
    }
  }

  function costLabel(cost) {
    const parts = [];
    if (cost.coin) parts.push(`${cost.coin}c`);
    if (cost.wood) parts.push(`${cost.wood}w`);
    if (cost.stone) parts.push(`${cost.stone}s`);
    return parts.length ? parts.join(' ') : 'free';
  }

    write(1, y++, `Food ${Math.floor(game.food)}  +${fProd} farm -${fCons} eat`, fNet >= 0 ? '#cfe0b0' : '#e0a89a');
    // Coin line: stored, with tax income and hero wages split.

    const cWage = heroWages();
    const cNet = cInc - cWage;
    write(1, y++, `Coin ${game.coin}  +${cInc} tax -${cWage} pay`, cNet >= 0 ? '#cfe0b0' : '#e0a89a');
    write(1, y++, `Guards ${aliveGuards()}/${guardCount()}${game.raidsLost ? `   Lost to raids: ${game.raidsLost}` : ''}`, '#d8c08a');
    y++;

    // Castle upgrade (food-gated).
    const nextFood = castleTier().upgradeFood;
    if (nextFood != null) {
      const ok = game.food >= nextFood;
      write(1, y, `[ Upgrade castle  ${nextFood} food ]`, ok ? '#cfe0b0' : '#8a7f68');
      hot(y, 0, viewCols - 1, { type: 'upgrade' });
    } else {
      write(1, y, 'Castle at maximum tier', '#8f846b');
    }
    y += 2;

    // Construction.
    hline(y++);
    write(1, y++, 'BUILD  (coin)', '#c9a35a');
    if (game.building) {
      write(1, y++, `...building ${BUILDINGS[game.building.id].name} (${game.building.remaining} left)`, '#cdb98a');
    }
    for (const id of BUILD_ORDER.concat(GUILD_ORDER)) {
      const def = BUILDINGS[id];
      if (hasBuilt(id)) { write(1, y++, `[x] ${def.name}`, '#6e9b5a'); continue; }
      if (def.terrain && !game.castleAdj[def.terrain]) {
        write(1, y++, `[-] ${def.name} (needs ${def.terrain})`, '#5b5343');
        continue;
      }
      const busy = !!game.building;
      const ok = !busy && game.coin >= def.coin;
      const note = def.note ? ` ${def.note}` : '';
      write(1, y, `[ ] ${def.name}  ${def.coin}c${note}`, ok ? '#cfe0b0' : '#8a7f68');
      if (!busy) hot(y, 0, viewCols - 1, { type: 'build', id });
      y++;
    }
    y++;

    // Hiring (built guilds).
    const builtGuilds = GUILD_ORDER.filter(id => hasBuilt(id));
    if (builtGuilds.length) {
      hline(y++);
      write(1, y++, 'HIRE  (coin)', '#c9a35a');
      for (const id of builtGuilds) {
        const guild = BUILDINGS[id].guild;
        const t = HERO_TEMPLATES[guild];
        const have = heroesOfGuild(guild);
        const ok = canHire(guild);
        const drag = t.taxDrag ? ` -${t.taxDrag} tax` : '';
        write(1, y, `[+] ${t.name}  ${t.hireCoin}c (${have}/${MAX_HEROES_PER_GUILD})${drag}`, ok ? '#cfe0b0' : '#8a7f68');
        if (ok) hot(y, 0, viewCols - 1, { type: 'hire', guild });

      }
      y++;
    }


    for (let gy = 0; gy < viewRows; gy++) {
      for (let gx = 0; gx < viewCols; gx++) {
        const cell = cells[gy][gx];
        setGridCell(gy * viewCols + gx, cell.ch, cell.fg, cell.bg, { view: 'city' });
      }
    }
  }

  // Simple greedy word wrap. Breaks on spaces, carries a 2-space continuation
  // indent on wrapped lines, and hard-splits any single token wider than the
  // column. Always returns at least one line.
  function wrapText(text, width) {
    if (width < 1) return [text];
    const lead = (String(text).match(/^\s*/) || [''])[0];
    const cont = lead.length + 2 < width ? lead + '  ' : lead;
    const tokens = String(text).trim().length ? String(text).trim().split(/\s+/) : [''];
    const lines = [];
    let cur = lead;
    let hasWord = false;
    for (let token of tokens) {
      while (token.length > width) {
        if (hasWord) { lines.push(cur); cur = cont; hasWord = false; }
        const room = Math.max(1, width - cur.length);
        lines.push(cur + token.slice(0, room));
        token = token.slice(room);
        cur = cont;
        hasWord = false;
      }
      const sep = hasWord ? 1 : 0;
      if (hasWord && cur.length + sep + token.length > width) {
        lines.push(cur);
        cur = cont + token;
      } else {
        cur = cur + (hasWord ? ' ' : '') + token;
      }
      hasWord = true;
    }
    lines.push(cur);
    return lines;
  }

  function renderReportView() {
    ensureGridCells();
    const rows = Array.from({ length: viewRows }, () => ({ text: '', fg: '#cfc6a8', bg: '#11130f' }));
    rows[0] = { text: '< BACK TO MAP', fg: '#f7d176', bg: '#11130f' };
    rows[1] = { text: '-'.repeat(viewCols), fg: '#6e664f', bg: '#11130f' };
    rows[2] = { text: 'TURN REPORT', fg: '#c9a35a', bg: '#11130f' };

    const threats = game ? game.hostiles.filter(hostile => hostile.alive).length : 0;
    rows[4] = { text: game ? `POP ${game.population}/${housingCap()}  COIN ${game.coin}  FOOD ${Math.floor(game.food)}  THREATS ${threats}` : '', fg: '#d8d2bf', bg: '#11130f' };
    if (game) {
      let y = 6;
      const put = (text, fg) => {
        for (const line of wrapText(text, viewCols)) {
          if (y >= viewRows - 1) break;
          rows[y++] = { text: line, fg, bg: '#11130f' };
        }
      };
      const builtNames = game.built.map(id => BUILDINGS[id].name).join(', ') || 'none';
      put(`${castleTier().name} — buildings: ${builtNames}`, '#c9a35a');
      y += 1;
      for (const actor of game.actors) {
        if (y >= viewRows - 2) break;
        const state = actor.alive ? `${actor.x},${actor.y} HP${actor.hp}/${actor.maxHp}` : 'DEAD';
        const goal = actor.goal ? `${actor.goal.type} ${actor.goal.target.x},${actor.goal.target.y}` : 'idle';
        rows[y++] = { text: `${actor.glyph} ${actor.name} ${state} ${goal}`, fg: actor.alive ? actor.fg : '#7a4a4a', bg: '#11130f' };
      }

      // Recent summary events.
      if (y < viewRows - 2) {
        y += 1;
        rows[y++] = { text: 'EVENTS', fg: '#c9a35a', bg: '#11130f' };
        for (const line of game.reports.slice(0, 4)) {
          if (y >= viewRows - 1) break;
          put(line, '#d8d2bf');
        }
      }

      // Detailed battle log (newest first), word-wrapped to the column.
      if (game.battleLog.length && y < viewRows - 2) {
        y += 1;
        rows[y++] = { text: 'BATTLE LOG', fg: '#c9a35a', bg: '#11130f' };
        for (const entry of game.battleLog) {
          if (y >= viewRows - 1) break;
          // Engagement headers (T05 ...) brighter than the indented swing lines.
          put(entry, /^\s/.test(entry) ? '#9b8f72' : '#cdb98a');
        }
      }
    }

    for (let gy = 0; gy < viewRows; gy++) {
      const row = rows[gy];
      for (let gx = 0; gx < viewCols; gx++) {
        setGridCell(gy * viewCols + gx, row.text[gx] || ' ', row.fg, row.bg, { view: 'report' });
      }
    }
  }

  // ---- camera / click -----------------------------------------------------
  // The viewport below is intentionally constrained to a phone-like window.
  // The player-facing app is only this grid; any readouts or controls outside
  // it are debug surfaces and should eventually move in-grid or disappear.
  const viewport = document.getElementById('viewport');
  const mapEl = document.getElementById('map');
  let gridCells = [];
  let gridCellState = [];
  let edgeActorCells = new Int16Array(0);
  let fightFlashCells = null;
  const TOP_BAR_ROWS = 1;
  const BOTTOM_BAR_ROWS = 1;
  let viewCols = 1, viewRows = 1;
  let cameraX = 0, cameraY = 0;
  let viewMode = 'world';
  let cityTile = null;
  let cityHotspots = [];
  let selectedActor = null;
  let selectedHostile = null;
  let highlightedTile = null;
  const CLICK_SLOP = 6;
  let isAnimatingTurn = false;

  function visibleWorldRows() {
    return Math.max(1, viewRows - TOP_BAR_ROWS - BOTTOM_BAR_ROWS);
  }

  function worldCellFromScreen(gx, gy, camX = cameraX, camY = cameraY) {
    if (gx < 0 || gx >= viewCols) return null;
    if (gy < TOP_BAR_ROWS || gy >= viewRows - BOTTOM_BAR_ROWS) return null;
    const x = camX + gx;
    const y = camY + (gy - TOP_BAR_ROWS);
    if (x < 0 || y < 0 || x >= COLS || y >= ROWS) return null;
    return { x, y };
  }

  function describeTile(tile) {
    if (!tile) return game ? game.log : 'DRAG TO PAN · TAP UNIT OR CASTLE';
    const actor = actorAt(tile.x, tile.y);
    const hostile = game && game.visible[idx(tile.x, tile.y)] ? hostileAt(tile.x, tile.y) : null;
    const actorText = actor ? ` ${actor.name.toUpperCase()} HP${actor.hp} ${actor.cargoFood ? ` FOOD${actor.cargoFood}` : ''} ${actor.goal ? actor.goal.type.toUpperCase() : 'IDLE'}` : '';
    const hostileText = hostile ? ` ${hostile.name.toUpperCase()} HP${hostile.hp}` : '';
    return `${tile.x},${tile.y} ${T[tile.tKey].name.toUpperCase()}${actorText}${hostileText}`;
  }

  function clampCamera() {
    cameraX = Math.max(0, Math.min(COLS - viewCols, cameraX));
    cameraY = Math.max(0, Math.min(ROWS - visibleWorldRows(), cameraY));
  }

  function updateViewGridSize() {
    const nextCols = Math.max(1, Math.min(COLS, Math.floor(viewport.clientWidth / CELL_W)));
    const nextRows = Math.max(TOP_BAR_ROWS + BOTTOM_BAR_ROWS + 1, Math.min(ROWS, Math.floor(viewport.clientHeight / CELL_H)));
    if (nextCols !== viewCols || nextRows !== viewRows) {
      gridCells = [];
      gridCellState = [];
    }
    viewCols = nextCols;
    viewRows = nextRows;
    clampCamera();
  }

  function centerCameraOnCastle() {
    let targetX = Math.floor(COLS / 2);
    let targetY = Math.floor(ROWS / 2);
    if (map) {
      for (let y = 0; y < ROWS; y++) {
        const x = map.tiles[y].indexOf('CASTLE');
        if (x !== -1) {
          targetX = x;
          targetY = y;
          break;
        }
      }
    }
    cameraX = targetX - Math.floor(viewCols / 2);
    cameraY = targetY - Math.floor(visibleWorldRows() / 2);
    clampCamera();
    return { x: targetX, y: targetY };
  }

  let dragging = false;
  let dragStartX = 0, dragStartY = 0, cameraStartX = 0, cameraStartY = 0;
  let dragMoved = false;
  let dragPointerId = null;
  let renderQueued = false;

  function isMobileMode() {
    return document.body.classList.contains('mobile-device');
  }

  function requestRender() {
    if (renderQueued) return;
    renderQueued = true;
    requestAnimationFrame(() => {
      renderQueued = false;
      if (map) render(map);
    });
  }

  function screenCellFromPoint(clientX, clientY) {
    const rect = viewport.getBoundingClientRect();
    return {
      gx: Math.floor((clientX - rect.left) / CELL_W),
      gy: Math.floor((clientY - rect.top) / CELL_H),
    };
  }

  function handleGridClick(clientX, clientY) {
    const { gx, gy } = screenCellFromPoint(clientX, clientY);
    if (gx < 0 || gy < 0 || gx >= viewCols || gy >= viewRows) return;

    if (isAnimatingTurn) return;

    // Top-bar tap takes the next big turn (economy + sub-turns).
    if (viewMode === 'world' && gy === 0) {
      advanceTurn();
      return;
    }

    if (viewMode === 'city') {
      const spot = cityHotspots.find(h => h.y === gy && gx >= h.x0 && gx <= h.x1);
      if (!spot) return;
      const a = spot.action;
      if (a.type === 'back') {
        viewMode = 'world';
        render(map);
        updateCursorFromPoint(clientX, clientY);
        return;
      }
      // Player management actions apply immediately and re-render the screen.
      if (a.type === 'upgrade') upgradeCastle();
      else if (a.type === 'build') startBuild(a.id);
      else if (a.type === 'hire') hireHero(a.guild);
      renderCityView();
      return;
    }

    if (viewMode === 'report') {
      if (gy <= 1) {
        viewMode = 'world';
        render(map);
        updateCursorFromPoint(clientX, clientY);
      }
      return;
    }

    if (viewMode === 'actor') {
      if (gy <= 1) {
        viewMode = 'world';
        selectedActor = null;
        render(map);
        updateCursorFromPoint(clientX, clientY);
      }
      return;
    }

    if (viewMode === 'enemy') {
      if (gy <= 1) {
        viewMode = 'world';
        selectedHostile = null;
        render(map);
        updateCursorFromPoint(clientX, clientY);
      }
      return;
    }

    // Bottom status bar opens the turn report / battle log on demand.
    if (gy === viewRows - 1) {
      viewMode = 'report';
      render(map);
      return;
    }

    const indicatorActorIndex = edgeActorCells[gy * viewCols + gx] - 1;
    if (indicatorActorIndex >= 0 && game) {
      const actor = game.actors[indicatorActorIndex];
      if (actor && actor.alive) {
        selectedActor = actor;
        highlightedTile = { x: actor.x, y: actor.y, tKey: map.tiles[actor.y][actor.x] };
        viewMode = 'actor';
        render(map);
        updateCursorFromPoint(clientX, clientY);
        return;
      }
    }

    const tile = worldCellFromScreen(gx, gy);
    if (!map || !tile) return;
    const tKey = map.tiles[tile.y][tile.x];
    const tileIndex = idx(tile.x, tile.y);
    // The castle always opens the city view, even when a guard is standing on it.
    if (tKey === 'CASTLE') {
      cityTile = { x: tile.x, y: tile.y, tKey };
      selectedActor = null;
      viewMode = 'city';
      render(map);
      updateCursorFromPoint(clientX, clientY);
      return;
    }
    const actor = game && game.visible[tileIndex] ? actorAt(tile.x, tile.y) : null;
    if (actor) {
      selectedActor = actor;
      highlightedTile = { x: tile.x, y: tile.y, tKey };
      viewMode = 'actor';
      render(map);
      updateCursorFromPoint(clientX, clientY);
      return;
    }
    const hostile = game && game.visible[tileIndex] ? hostileAt(tile.x, tile.y) : null;
    if (hostile) {
      selectedHostile = hostile;
      highlightedTile = { x: tile.x, y: tile.y, tKey };
      viewMode = 'enemy';
      render(map);
      updateCursorFromPoint(clientX, clientY);
      return;
    }
    highlightedTile = { x: tile.x, y: tile.y, tKey: game && game.discovered[tileIndex] ? tKey : 'UNKNOWN' };
    render(map);
    updateCursorFromPoint(clientX, clientY);
  }

  viewport.addEventListener('pointerdown', (e) => {
    if (e.button !== 0) return;
    if (isAnimatingTurn) return;
    e.preventDefault();
    dragging = true;
    dragPointerId = e.pointerId;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    cameraStartX = cameraX;
    cameraStartY = cameraY;
    dragMoved = false;
    viewport.classList.add('dragging');
    if (viewMode === 'world') document.body.classList.add('panning');
    // Clear any existing selection so a drag never feels like text selection.
    const sel = window.getSelection && window.getSelection();
    if (sel) sel.removeAllRanges();
    try { viewport.setPointerCapture(e.pointerId); } catch (_) {}
  });

  viewport.addEventListener('pointermove', (e) => {
    if (!dragging) {
      if (!isMobileMode()) updateCursorFromPoint(e.clientX, e.clientY);
      return;
    }
    if (!dragging || e.pointerId !== dragPointerId) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    if (Math.hypot(dx, dy) > CLICK_SLOP) dragMoved = true;
    if (viewMode !== 'world') return;
    const prevCameraX = cameraX;
    const prevCameraY = cameraY;
    cameraX = cameraStartX - Math.round(dx / CELL_W);
    cameraY = cameraStartY - Math.round(dy / CELL_H);
    clampCamera();
    if (cameraX !== prevCameraX || cameraY !== prevCameraY) requestRender();
    if (!isMobileMode()) updateCursorFromPoint(e.clientX, e.clientY);
  });

  function endDrag(e, allowClick) {
    if (!dragging || (e && e.pointerId !== dragPointerId)) return;
    if (allowClick && !dragMoved) handleGridClick(e.clientX, e.clientY);
    dragging = false;
    dragPointerId = null;
    dragMoved = false;
    viewport.classList.remove('dragging');
    document.body.classList.remove('panning');
  }
  viewport.addEventListener('pointerup', (e) => endDrag(e, true));
  viewport.addEventListener('pointercancel', (e) => endDrag(e, false));
  viewport.addEventListener('lostpointercapture', (e) => endDrag(e, false));

  const cursor = document.getElementById('cursor');
  function updateCursorFromPoint(clientX, clientY) {
    if (!cursor) return;
    const { gx, gy } = screenCellFromPoint(clientX, clientY);
    if (viewMode === 'city' || viewMode === 'report' || viewMode === 'actor' || viewMode === 'enemy') {
      if (gx < 0 || gy < 0 || gx >= viewCols || gy >= viewRows) {
        cursor.textContent = 'cursor: —';
        return;
      }
      cursor.innerHTML = `cursor: ${viewMode} screen (<b>${gx}</b>, <b>${gy}</b>)`;
      return;
    }
    const tile = worldCellFromScreen(gx, gy);
    if (!map || gx < 0 || gy < 0 || gx >= viewCols || gy >= viewRows || !tile) {
      cursor.textContent = 'cursor: —';
      return;
    }
    const indicatorActorIndex = edgeActorCells[gy * viewCols + gx] - 1;
    if (indicatorActorIndex >= 0 && game) {
      const actor = game.actors[indicatorActorIndex];
      if (actor && actor.alive) {
        const tKey = map.tiles[actor.y][actor.x];
        const nextHighlight = { x: actor.x, y: actor.y, tKey };
        const changed = !highlightedTile || highlightedTile.x !== nextHighlight.x || highlightedTile.y !== nextHighlight.y || highlightedTile.tKey !== nextHighlight.tKey;
        highlightedTile = nextHighlight;
        if (changed) render(map);
        cursor.innerHTML = `cursor: actor <b>${actor.name}</b> at (<b>${actor.x}</b>, <b>${actor.y}</b>) — <b>${T[tKey].name}</b>`;
        return;
      }
    }
    const isKnown = game && game.discovered[idx(tile.x, tile.y)];
    const tKey = isKnown ? map.tiles[tile.y][tile.x] : 'UNKNOWN';
    const nextHighlight = { x: tile.x, y: tile.y, tKey };
    const changed = !highlightedTile || highlightedTile.x !== nextHighlight.x || highlightedTile.y !== nextHighlight.y || highlightedTile.tKey !== nextHighlight.tKey;
    highlightedTile = nextHighlight;
    if (changed) render(map);
    cursor.innerHTML = `cursor: (<b>${tile.x}</b>, <b>${tile.y}</b>) · screen (<b>${gx}</b>, <b>${gy}</b>) — <b>${T[tKey].name}</b>`;
  }
  viewport.addEventListener('pointerleave', () => {
    if (!dragging) cursor.textContent = 'cursor: —';
  });

  window.addEventListener('resize', () => {
    applyDeviceMode();
    updateViewGridSize();
    if (map) render(map);
  });

  let map = null;
  let game = null;
  let lastTurnEvents = [];

  function startGame(seed, options = null) {
    map = generate(seed);
    game = makeGameState(map);
    for (let i = 0; i < guardCount(); i++) spawnGuard();  // initial garrison
    viewMode = 'world';
    cityTile = null;
    selectedActor = null;
    selectedHostile = null;
    fightFlashCells = null;
    lastTurnEvents = [];
    document.getElementById('seed').textContent = seed.toString(16);
    updateViewGridSize();
    const castle = centerCameraOnCastle();
    updateVisibility();
    highlightedTile = { x: castle.x, y: castle.y, tKey: map.tiles[castle.y][castle.x] };
    if (!options || options.render !== false) render(map);
  }

  function reroll() {
    startGame(Math.floor(Math.random() * 0x7fffffff), { render: true });
  }

  function actorSnapshot(actor) {
    return {
      id: actor.id,
      name: actor.name,
      x: actor.x,
      y: actor.y,
      hp: actor.hp,
      maxHp: actor.maxHp,
      supply: actor.supply,
      maxSupply: actor.maxSupply,
      cargoFood: actor.cargoFood,
      cargoWood: actor.cargoWood,
      role: actor.role,
      searchR: actor.searchR,
      alive: actor.alive,
      xp: actor.xp,
      goal: actor.goal ? actor.goal.type : 'idle',
      goalReason: actor.goal ? actor.goal.reason : null,
      gx: actor.goal && actor.goal.target ? actor.goal.target.x : null,
      gy: actor.goal && actor.goal.target ? actor.goal.target.y : null,
    };
  }

  function hostileSnapshot(hostile) {
    return {
      id: hostile.id,
      kind: hostile.kind,
      name: hostile.name,
      x: hostile.x,
      y: hostile.y,
      hp: hostile.hp,
      maxHp: hostile.maxHp,
      alive: hostile.alive,
      goal: hostile.goal ? hostile.goal.type : 'idle',
    };
  }

  function simulationSnapshot() {
    if (!game) return null;
    const discovered = discoveredCount();
    return {
      seed: map.seed,
      turn: game.turn,
      discovered,
      discoveredPct: discovered / (COLS * ROWS),
      ruinsDiscovered: game.discoveredRuins.size,
      ruinsExplored: game.exploredRuins.size,
      coin: game.coin,
      food: Math.floor(game.food),
      foodNet: Math.round((foodProduction() - foodConsumption()) * 10) / 10,
      actors: game.actors.map(actorSnapshot),
      hostiles: game.hostiles.map(hostileSnapshot),
      hostilesAlive: game.hostiles.filter(hostile => hostile.alive).length,
      population: game.population,
      housing: housingCap(),
      castleTier: game.castleTier,
      castleName: castleTier().name,
      guards: aliveGuards(),
      guardTarget: guardCount(),
      raidsLost: game.raidsLost,
      waveNum: game.waveNum,
      heroes: { ranger: heroesOfGuild('ranger'), rogue: heroesOfGuild('rogue'), fighter: heroesOfGuild('fighter'), monster: heroesOfGuild('monster') },
      policy: game.policy,
      built: game.built.slice(0),
      building: game.building ? game.building.id : null,
      season: game.season,
      simStats: { ...game.simStats },
      lastEvents: lastTurnEvents.slice(0),
      battleLog: game.battleLog.slice(0, 16),
    };
  }

  function resetSimulationStats() {
    if (!game) return null;
    game.simStats = makeSimStats();
    return simulationSnapshot();
  }

  // One big turn headless: economy tick, then SUBTURNS sub-turns resolved
  // synchronously, merging the digest.
  function stepSimulationTurn() {
    if (!game) return null;
    viewMode = 'world';
    isAnimatingTurn = false;
    const events = [];
    let combats = 0;
    bigTurnEconomy(events);
    for (let i = 0; i < SUBTURNS; i++) {
      const plan = computeTurnPlan({ recordMoves: false, events });
      if (plan) combats += plan.combats.length;
    }
    endBigTurn(events);
    lastTurnEvents = events.slice(0);
    return {
      events: lastTurnEvents.slice(0),
      combats,
      snapshot: simulationSnapshot(),
    };
  }

  window.__lorTest = {
    newGame(seed, options = null) {
      startGame((seed >>> 0) || 1, { render: !!(options && options.render) });
      // The Steward is off by default in the live game; the harness needs it
      // to operate the city, so enable it here.
      if (game) {
        game.autoSteward = true;
        if (options && options.policy && POLICIES[options.policy]) game.policy = options.policy;
      }
      return simulationSnapshot();
    },
    stepTurn: stepSimulationTurn,
    runTurns(count) {
      let result = null;
      for (let i = 0; i < count; i++) result = stepSimulationTurn();
      return result ? result.snapshot : simulationSnapshot();
    },
    resetStats: resetSimulationStats,
    snapshot: simulationSnapshot,
    _map: () => map,
    setSeason(s) {
      if (game) game.season = s;
      if (game && viewMode === 'world') render(map);
      return game ? game.season : null;
    },
    // Debug helper for the preview: stop auto-advance, optionally set the
    // season, and reveal the whole map (discovered + visible) so terrain
    // colors can be inspected across the board, then render.
    previewReveal(season) {
      if (!game) return null;
      if (season) game.season = season;
      game.discovered.fill(1);
      game.visible.fill(1);
      game.discoveredTotal = COLS * ROWS;
      viewMode = 'world';
      render(map);
      return game.season;
    },
  };

  document.getElementById('reroll').addEventListener('click', reroll);

  if ('serviceWorker' in navigator) {
    // When a freshly activated SW takes control, reload once so the visible
    // page swaps to the new app shell instead of staying on the old DOM.
    // Skip the first-ever install (no prior controller → nothing is stale).
    const hadController = !!navigator.serviceWorker.controller;
    let swReloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (swReloading || !hadController) return;
      swReloading = true;
      window.location.reload();
    });
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  renderLegend();
  startGame(Math.floor(Math.random() * 0x7fffffff), { render: true });
})();
</script>
</body>
</html>
