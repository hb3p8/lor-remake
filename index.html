    heroes:   { name: 'Heroes',   build: ['granary', 'fisher', 'fighters', 'blacksmith', 'rangers', 'monsters', 'market'], heroes: { ranger: 2, fighter: 2, monster: 2 }, bountyReserve: 120 },
    rogues:   { name: 'Rogues',   build: ['granary', 'fisher', 'rogues', 'blacksmith', 'market', 'hunter'],          heroes: { rogue: 3 }, bountyReserve: 360 },
    balanced: { name: 'Balanced', build: ['granary', 'fisher', 'fighters', 'blacksmith', 'market', 'rangers', 'monsters', 'hunter'], heroes: { fighter: 2, monster: 2, ranger: 1 }, bountyReserve: 240 },
  };
  // Steward bounty tuning (harness-only — the live player posts their own).
  const BOUNTY_TURN_BUDGET = 75;   // max coin the Steward commits to bounties per big turn
  const CRYPT_BOUNTY_CAP = 120;    // target reward to destroy an undead crypt (siege threat)
  const DEN_BOUNTY_CAP = 75;       // ...a troll den (regional)
  const SCOUT_BOUNTY_CAP = 50;     // ...to scout a frontier pocket
  const SCOUT_BOUNTY_COUNT = 2;    // standing scouting flags to maintain

  function runSteward() {
    if (!game.autoSteward) return;
    const p = POLICIES[game.policy] || POLICIES.balanced;
    // Grow: upgrade the castle as soon as every requirement (food + coin +
    // hero minimum) is met. Coin accrues naturally once the finite build/hire
    // lists are done, so the (significant) cost is paid without starving
    // defense — no explicit hoarding that would suppress hero hiring.
    if (game.population >= housingCap() && canUpgradeCastle()) upgradeCastle();
    // Build one structure (per the policy's order) when idle and affordable.
    // Guild buildings wait for a coin cushion so basics land first.
    if (!game.building) {
      for (const id of p.build) {
        const def = BUILDINGS[id];
        if (def.guild && game.coin < def.coin + 80) continue;
        if (buildingAvailable(id) && game.coin >= def.coin) { startBuild(id); break; }
      }
    }
    // Hire toward the policy's hero targets when coin is comfortable.
    for (const guild of Object.keys(p.heroes)) {
      if (guildBuilt(guild) && heroesOfGuild(guild) < p.heroes[guild] && game.coin >= HERO_TEMPLATES[guild].hireCoin + 100) {
        hireHero(guild);
        break;
      }
    }
    // Direct heroes with bounties, like a player would (surplus coin only).
    stewardBounties(p);
  }

  // Pick a fog pocket to scout: push a few tiles past a frontier cell, away from
  // the keep, so the flag pulls a scout outward into the unknown. Deterministic.
  function stewardScoutTarget() {
    const fr = game.caches.frontier;
    if (!fr.length) return null;
    const cell = fr[(game.turn * 7 + 3) % fr.length];
    const fx = cell % COLS, fy = (cell / COLS) | 0;
    const dx = fx - game.castle.x, dy = fy - game.castle.y;
    const len = Math.max(1, Math.abs(dx) + Math.abs(dy));
    const tx = Math.max(1, Math.min(COLS - 2, fx + Math.round(dx / len * 6)));
    const ty = Math.max(1, Math.min(ROWS - 2, fy + Math.round(dy / len * 6)));
    return isPassableForActor(tx, ty) ? { x: tx, y: ty } : { x: fx, y: fy };
  }

  // The Steward steers heroes with bounties (harness director). Spends only the
  // coin above its policy reserve, capped per big turn, prioritising lairs
  // (crypts first), then maintaining a couple of scouting flags. One raise per
  // target per turn, so flags grow over a few turns and the spend stays gradual.
  function stewardBounties(p) {
    let spend = Math.min(BOUNTY_TURN_BUDGET, game.coin - (p.bountyReserve || 300));
    if (spend < BOUNTY_STEP) return;
    const raiseToward = (type, key, cap) => {
      if (spend < BOUNTY_STEP) return;
      const existing = type === 'lair'
        ? game.bounties.find(x => x.type === 'lair' && x.lairId === key)
        : exploreBountyAt(key.x, key.y);
      if (existing && existing.reward >= cap) return;
      const before = existing ? existing.reward : 0;
      const b = raiseBounty(type, key);
      if (b && b.reward > before) spend -= BOUNTY_STEP;
    };
    // Lairs: crypts (siege threat) before dens, nearer before farther.
    const lairs = game.lairs
      .filter(l => l.active && !l.destroyed && game.discovered[idx(l.x, l.y)])
      .sort((a, b) => (a.type === 'undead' ? 0 : 1) - (b.type === 'undead' ? 0 : 1)
        || distanceToCastle(a.x, a.y) - distanceToCastle(b.x, b.y));
    for (const l of lairs) raiseToward('lair', l.id, l.type === 'undead' ? CRYPT_BOUNTY_CAP : DEN_BOUNTY_CAP);
    // Scouting: keep a couple of standing flags pushing the fog back.
    let scoutFlags = game.bounties.reduce((n, b) => n + (b.type === 'explore' ? 1 : 0), 0);
    while (scoutFlags < SCOUT_BOUNTY_COUNT && spend >= BOUNTY_STEP) {
      const tgt = stewardScoutTarget();
      if (!tgt || exploreBountyAt(tgt.x, tgt.y)) break;
      raiseBounty('explore', { x: tgt.x, y: tgt.y });
      spend -= BOUNTY_STEP;
      scoutFlags++;
    }
    // Top up existing scout flags toward their cap.
    for (const b of game.bounties) if (b.type === 'explore') raiseToward('explore', { x: b.x, y: b.y }, SCOUT_BOUNTY_CAP);
  }

  function revealAround(x, y, radius) {
    if (!game) return;
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        if (dx * dx + dy * dy > radius * radius) continue;
        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
        const i = idx(nx, ny);
        const wasDiscovered = game.discovered[i];
        game.discovered[i] = 1;
        if (!wasDiscovered) game.discoveredTotal++;
        game.visible[i] = 1;
        if (map.tiles[ny][nx] === 'RUIN') game.discoveredRuins.add(i);
        if (!wasDiscovered) game.caches.frontierDirty = 1;
      }
    }
  }

  function rebuildFrontier() {
    if (!game) return;
    const caches = game.caches;
    if (!caches.frontierDirty) return;
    caches.frontierMark.fill(0);
    caches.frontier.length = 0;
    for (let i = 0; i < caches.passable.length; i++) {
      const cell = caches.passable[i];
      const x = cell % COLS;
      const y = (cell / COLS) | 0;
      if (isFrontierTile(x, y)) {
        caches.frontierMark[cell] = 1;
        caches.frontier.push(cell);
      }
    }
    caches.frontierDirty = 0;
  }

  function updateVisibility() {
    if (!game) return;
    game.visible.fill(0);
    revealAround(game.castle.x, game.castle.y, 7);
    for (const actor of game.actors) {
      if (actor.alive) revealAround(actor.x, actor.y, actor.vision);
    }
    rebuildFrontier();
  }

  function actorAt(x, y) {
    if (!game) return null;
    return game.actors.find(actor => actor.alive && actor.x === x && actor.y === y) || null;
  }

  function hostileAt(x, y) {
    if (!game) return null;
    return game.hostiles.find(hostile => hostile.alive && hostile.x === x && hostile.y === y) || null;
  }

  // A standing (not destroyed) lair on a cell, if any.
  function lairAt(x, y) {
    if (!game || !game.lairs) return null;
    for (const l of game.lairs) if (!l.destroyed && l.x === x && l.y === y) return l;
    return null;
  }
  // The active lair within Chebyshev `cheb` of (x,y) — used to know when a hero
  // is in striking range of a lair (cheb 1 = adjacent or on it).
  function activeLairWithin(x, y, cheb) {
    if (!game || !game.lairs) return null;
    for (const l of game.lairs) {
      if (!l.active) continue;
      if (Math.max(Math.abs(l.x - x), Math.abs(l.y - y)) <= cheb) return l;
    }
    return null;
  }
  // Nearest discovered, active, reachable lair to an actor (for assault goals).
  function nearestKnownActiveLair(actor) {
    if (!game || !game.lairs) return null;
    const comp = game.caches.component;
    const mine = comp[idx(actor.x, actor.y)];
    let best = null, bestD = Infinity;
    for (const l of game.lairs) {
      if (!l.active || !game.discovered[idx(l.x, l.y)]) continue;
      if (comp[idx(l.x, l.y)] !== mine) continue;
      const d = Math.abs(l.x - actor.x) + Math.abs(l.y - actor.y);
      if (d < bestD) { bestD = d; best = l; }
    }
    return best;
  }
  // Nearest discovered, undelved, reachable, lair-free ruin (a delve target).
  function nearestKnownUndelvedRuin(actor) {
    if (!game || !game.caches.ruins) return null;
    const comp = game.caches.component;
    const mine = comp[idx(actor.x, actor.y)];
    let best = null, bestD = Infinity;
    for (const cell of game.caches.ruins) {
      if (!game.discovered[cell] || game.exploredRuins.has(cell)) continue;
      if (comp[cell] !== mine) continue;
      const x = cell % COLS, y = (cell / COLS) | 0;
      if (lairAt(x, y)) continue;                 // crypt ruins are assault targets, not loot
      const d = Math.abs(x - actor.x) + Math.abs(y - actor.y);
      if (d < bestD) { bestD = d; best = { x, y }; }
    }
    return best;
  }
  // A hero standing on an undelved, lair-free ruin claims its one-time treasure.
  function delveRuin(actor, events) {
    if (!actor.hero || !actor.alive) return;
    const i = idx(actor.x, actor.y);
    if (map.tiles[actor.y][actor.x] !== 'RUIN' || game.exploredRuins.has(i) || lairAt(actor.x, actor.y)) return;
    game.exploredRuins.add(i);
    actor.purse += RUIN_TREASURE;
    game.wildGold += RUIN_TREASURE;
    if (events) events.push(`${actor.name} delves the ruins (+${RUIN_TREASURE} gold).`);
  }

  // ---- bounties (player steering) ---------------------------------------
  function exploreBountyAt(x, y) { return game.bounties.find(b => b.type === 'explore' && b.x === x && b.y === y) || null; }
  function killBountyOn(hostile) { return hostile && game.bounties.find(b => b.type === 'kill' && b.hostileId === hostile.id) || null; }
  function lairBountyOn(lair) { return lair && game.bounties.find(b => b.type === 'lair' && b.lairId === lair.id) || null; }
  // Post a new bounty or raise an existing one by one preset step, escrowing the
  // step from the treasury. Returns the bounty (or null if unaffordable/capped).
  function raiseBounty(type, key) {
    let b = type === 'explore' ? exploreBountyAt(key.x, key.y)
      : game.bounties.find(x => x.type === type && (type === 'kill' ? x.hostileId === key : x.lairId === key));
    if (!b) {
      if (game.bounties.length >= MAX_BOUNTIES || game.coin < BOUNTY_STEP) return null;
      b = { id: ++game.bountySeq, type, reward: 0 };
      if (type === 'explore') { b.x = key.x; b.y = key.y; }
      else if (type === 'kill') { b.hostileId = key; }
      else { b.lairId = key; }
      game.bounties.push(b);
    }
    if (b.reward < BOUNTY_MAX && game.coin >= BOUNTY_STEP) { game.coin -= BOUNTY_STEP; b.reward += BOUNTY_STEP; }
    return b;
  }
  function cancelBounty(b) {
    if (!b) return;
    game.coin += b.reward;                       // refund the escrow
    game.bounties = game.bounties.filter(x => x !== b);
  }
  // Refund bounties that can no longer be fulfilled (target gone).
  function sweepBounties(events) {
    for (let i = game.bounties.length - 1; i >= 0; i--) {
      const b = game.bounties[i];
      let dead = false;
      if (b.type === 'kill') dead = !game.hostiles.some(h => h.alive && h.id === b.hostileId);
      else if (b.type === 'lair') { const l = game.lairs && game.lairs.find(x => x.id === b.lairId); dead = !l || l.destroyed; }
      if (dead) {
        game.coin += b.reward;
        game.bounties.splice(i, 1);
        if (events && b.reward > 0) events.push('A bounty went unclaimed; its reward returns to the treasury.');
      }
    }
  }
  // A hero is ready to assault a lair only when healthy, and strong enough by
  // EITHER level OR raw combat power — so gear bought with gold (not just XP)
  // can graduate a hero to lair work, while weak heroes still keep clear.
  function lairAssaultReady(actor) {
    if (!actor.hero || actor.hp < actor.maxHp * 0.6) return false;
    if (actor.level >= (actor.role === 'monster' ? 3 : 4)) return true;
    return unitPower(actor) >= LAIR_ASSAULT_POWER;
  }
  // An open, unoccupied cell within radius r of (cx,cy) to spawn a lair monster.
  function findOpenCellNear(cx, cy, r) {
    for (let rad = 1; rad <= r; rad++) {
      for (let dy = -rad; dy <= rad; dy++) {
        for (let dx = -rad; dx <= rad; dx++) {
          if (Math.max(Math.abs(dx), Math.abs(dy)) !== rad) continue;
          const x = cx + dx, y = cy + dy;
          if (!isPassableForActor(x, y) || actorAt(x, y) || hostileAt(x, y) || lairAt(x, y)) continue;
          return { x, y };
        }
      }
    }
    return null;
  }

  function isPassableForActor(x, y) {
    if (x < 0 || y < 0 || x >= COLS || y >= ROWS) return false;
    return isFinite(terrainCost(map.tiles[y][x]));
  }

  // Cells where friendly units may pile up (the keep; villages/dungeons later).
  function isStackable(x, y) {
    return game && x === game.castle.x && y === game.castle.y;
  }

  function aliveHeroCount() {
    let n = 0;
    for (const a of game.actors) if (a.alive && a.hero) n++;
    return n;
  }

  // Spiral out from (x,y) for the nearest passable, unoccupied cell (the keep,
  // a stackable cell, always qualifies). Used to evacuate units stranded when
  // terrain freezes/thaws underneath them.
  function nearestPassableCell(x, y) {
    if (isPassableForActor(x, y) && !actorAt(x, y) && !hostileAt(x, y)) return { x, y };
    for (let r = 1; r < 24; r++) {
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          if (Math.max(Math.abs(dx), Math.abs(dy)) !== r) continue; // ring only
          const nx = x + dx, ny = y + dy;
          if (!isPassableForActor(nx, ny)) continue;
          if (isStackable(nx, ny)) return { x: nx, y: ny };
          if (!actorAt(nx, ny) && !hostileAt(nx, ny)) return { x: nx, y: ny };
        }
      }
    }
    return { x: game.castle.x, y: game.castle.y };
  }

  // After a season flip, evacuate heroes/guards left standing on terrain that
  // just turned impassable (sea/lake on the thaw, mountains on the freeze).
  // They wash up on the nearest open ground, battered to 10% HP (or less).
  function displaceStrandedUnits(events) {
    for (const a of game.actors) {
      if (!a.alive) continue;
      if (isPassableForActor(a.x, a.y)) continue; // ground under them is still fine
      const onMountain = map.tiles[a.y][a.x] === 'MOUNTAIN';
      const dest = nearestPassableCell(a.x, a.y);
      a.x = dest.x;
      a.y = dest.y;
      a.goal = null;
      a.hp = Math.min(a.hp, Math.max(1, Math.round(a.maxHp * 0.1)));
      if (events) events.push(onMountain
        ? `${a.name} is caught by the blizzard in the peaks, barely alive.`
        : `${a.name} crashes through the thawing ice, barely alive.`);
    }
  }

  function distanceToCastle(x, y) {
    return Math.abs(x - game.castle.x) + Math.abs(y - game.castle.y);
  }

  // Count not-yet-discovered tiles within a circular radius — mirrors
  // revealAround so it equals what a unit standing here will reveal next.
  function undiscoveredInRadius(x, y, radius) {
    let count = 0;
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        if (dx * dx + dy * dy > radius * radius) continue;
        const nx = x + dx, ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
        if (!game.discovered[idx(nx, ny)]) count++;
      }
    }
    return count;
  }

  function unknownCellsNear(x, y, radius) {
    let count = 0;
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
        if (!game.discovered[idx(nx, ny)]) count++;
      }
    }
    return count;
  }

  function nearbyTerrainCount(x, y, radius, types) {
    let count = 0;
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
        if (types.has(map.tiles[ny][nx])) count++;
      }
    }
    return count;
  }

  function isCastleFarmTile(x, y) {
    if (!game) return false;
    for (let i = 0; i < game.castleFarms.length; i++) {
      const farm = game.castleFarms[i];
      if (farm.x === x && farm.y === y) return true;
    }
    return false;
  }

  function isCastleFarmCandidate(x, y) {
    if (!game || game.castleFarms.length >= 4 || !isPassableForActor(x, y)) return false;
    if (Math.abs(x - game.castle.x) + Math.abs(y - game.castle.y) > 5) return false;
    const t = map.tiles[y][x];
    return (t === 'PLAINS' || t === 'GRASS') && !isCastleFarmTile(x, y);
  }

  function addRoadInfluenceForFarm(x, y) {
    if (!game) return;
    const nearRoads = game.caches.nearRoads;
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
        nearRoads[idx(nx, ny)]++;
      }
    }
  }

  function discoveredCount() {
    if (!game) return 0;
    if (game.discoveredTotal !== undefined) return game.discoveredTotal;
    let count = 0;
    for (let i = 0; i < game.discovered.length; i++) {
      if (game.discovered[i]) count++;
    }
    return count;
  }

  function aliveActorCount() {
    if (!game) return 0;
    let count = 0;
    for (let i = 0; i < game.actors.length; i++) {
      if (game.actors[i].alive) count++;
    }
    return count;
  }

  function isFrontierTile(x, y) {
    if (!game.discovered[idx(x, y)] || !isPassableForActor(x, y)) return false;
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
        if (!game.discovered[idx(nx, ny)]) return true;
      }
    }
    return false;
  }

  // Single cost function used by both planning (A*) and execution (budget drain).
  // `planning=true` adds a fog penalty so actors prefer charted routes when
  // path-finding, but actual step cost stays pure terrain + affinity.
  // While a sub-turn resolves, this holds the live cell-occupancy set so
  // pathfinding can route AROUND units that are parked in the way (the anti-
  // stack movement rule would otherwise just stall a unit against a neighbour
  // forever). Null outside resolution. A soft penalty, not a hard block, so a
  // path can still pass through / reach an occupied cell when there's no way
  // around (e.g. a stalk target).
  let pathOccupancy = null;
  const OCCUPANCY_PLAN_PENALTY = 8;

  function stepCostForActor(actor, from, to, planning) {
    if (!isPassableForActor(to.x, to.y)) return Infinity;
    const t = map.tiles[to.y][to.x];
    let cost = terrainCost(t);
    if (planning && pathOccupancy && !isStackable(to.x, to.y) && pathOccupancy.has(idx(to.x, to.y))) {
      cost += OCCUPANCY_PLAN_PENALTY; // prefer routing around a parked unit
    }
    // actor affinities
    if (ROADS.has(t)) {
      if (actor.id === 'guard') cost *= 0.6;
    } else {
      if (actor.id === 'hunter' && WOODS.has(t)) cost *= 0.8;
      if (actor.id === 'scout') cost *= 0.9;
    }
    // fog penalty: planning only — steers actors toward known terrain
    if (planning && !actor.kind && !game.discovered[idx(to.x, to.y)]) {
      cost += actor.id === 'scout' ? 2 : 8;
    }
    // danger penalty: planning only, non-combat roles — route around known
    // hostiles. Combat roles (guards, fighters, monster hunters) charge in.
    if (planning && !actor.kind && !isCombatRole(actor)) {
      cost += game.danger[idx(to.x, to.y)] * DANGER_AVERSION;
    }
    // diagonal multiplier
    if (from.x !== to.x && from.y !== to.y) cost *= 1.4;
    cost = Math.max(0.3, cost);
    // Execution: a single step must always be affordable on a full budget,
    // otherwise expensive terrain (mountains, cost 10) becomes impassable for
    // every unit whose step budget is lower — including bears on their own
    // preferred mountains. Crossing it simply consumes the whole turn.
    // Planning keeps the true (uncapped) cost so routes still prefer to go
    // around when there's a cheaper way.
    if (!planning) cost = Math.min(cost, actor.steps);
    return cost;
  }

  function findPath(actor, target) {
    const pathStartMs = game && game.simStats ? perfNow() : 0;
    if (game && game.simStats) game.simStats.pathCalls++;
    const finishPath = result => {
      if (game && game.simStats) game.simStats.pathMs += perfNow() - pathStartMs;
      return result;
    };
    if (!target || !isPassableForActor(target.x, target.y)) return finishPath(null);
    const start = idx(actor.x, actor.y);
    const goal = idx(target.x, target.y);
    if (start === goal) return finishPath([{ x: actor.x, y: actor.y }]);
    if (game.caches.component[start] !== game.caches.component[goal]) return finishPath(null);

    const scratch = game.pathScratch;
    const g = scratch.g;
    const came = scratch.came;
    const closed = scratch.closed;
    const heapI = scratch.heapI;
    const heapF = scratch.heapF;
    g.fill(Infinity);
    came.fill(-1);
    closed.fill(0);
    let heapSize = 0;
    const h = (x, y) => Math.max(Math.abs(x - target.x), Math.abs(y - target.y));
    const push = (cell, f) => {
      heapI[heapSize] = cell;
      heapF[heapSize] = f;
      let i = heapSize++;
      while (i > 0) {
        const p = (i - 1) >> 1;
        if (heapF[p] <= heapF[i]) break;
        const tf = heapF[p]; heapF[p] = heapF[i]; heapF[i] = tf;
        const ti = heapI[p]; heapI[p] = heapI[i]; heapI[i] = ti;
        i = p;
      }
    };
    const pop = () => {
      const top = heapI[0];
      heapSize--;
      if (heapSize) {
        heapI[0] = heapI[heapSize];
        heapF[0] = heapF[heapSize];
        let i = 0;
        while (true) {
          const l = i * 2 + 1;
          const r = i * 2 + 2;
          let s = i;
          if (l < heapSize && heapF[l] < heapF[s]) s = l;
          if (r < heapSize && heapF[r] < heapF[s]) s = r;
          if (s === i) break;
          const tf = heapF[s]; heapF[s] = heapF[i]; heapF[i] = tf;
          const ti = heapI[s]; heapI[s] = heapI[i]; heapI[i] = ti;
          i = s;
        }
      }
      return top;
    };

    g[start] = 0;
    push(start, h(actor.x, actor.y));
    while (heapSize) {
      const curI = pop();
      if (closed[curI]) continue;
      closed[curI] = 1;
      if (curI === goal) {
        const path = [];
        let i = goal;
        while (i !== -1) {
          path.push({ x: i % COLS, y: (i / COLS) | 0 });
          i = came[i];
        }
        path.reverse();
        return finishPath(path);
      }
      const curX = curI % COLS;
      const curY = (curI / COLS) | 0;
      for (let d = 0; d < 8; d++) {
        const nx = curX + PATH_DX[d];
        const ny = curY + PATH_DY[d];
        if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
        const ni = idx(nx, ny);
        if (closed[ni]) continue;
        // Block diagonal moves that skirt an impassable cell. In summer a river
        // also blocks the skirt (force a bridge/ford on one orthogonal step);
        // in winter the river is frozen solid and can be crossed freely.
        if (d >= 4) {
          const c1 = map.tiles[curY][nx], c2 = map.tiles[ny][curX];
          if (!isFinite(terrainCost(c1)) || !isFinite(terrainCost(c2))) continue;
          if (game.season !== 'winter' && (c1 === 'RIVER' || c2 === 'RIVER')) continue;
        }
        const step = stepCostForActor(actor, { x: curX, y: curY }, { x: nx, y: ny }, true);
        if (!isFinite(step)) continue;
        const ng = g[curI] + step;
        if (ng < g[ni]) {
          g[ni] = ng;
          came[ni] = curI;
          push(ni, ng + h(nx, ny));
        }
      }
    }
    return finishPath(null);
  }

  function insertBoundedCandidate(candidates, candidate, limit) {
    if (candidates.length >= limit && candidate.utility <= candidates[candidates.length - 1].utility) return;
    let i = candidates.length;
    candidates.push(candidate);
    while (i > 0 && candidates[i - 1].utility < candidate.utility) {
      candidates[i] = candidates[i - 1];
      i--;
    }
    candidates[i] = candidate;
    if (candidates.length > limit) candidates.length = limit;
  }

  function addGoalCandidate(candidates, limit, actor, type, x, y, utility, reason) {
    if (!isPassableForActor(x, y)) return;
    // Steer non-guard roles away from objectives sitting in danger; guards
    // are willing to work contested ground.
    if (!isCombatRole(actor)) utility -= game.danger[idx(x, y)] * 2;
    insertBoundedCandidate(candidates, { type, target: { x, y }, utility, reason }, limit);
  }
  // Roles that seek combat rather than avoid it.
  function isCombatRole(actor) {
    return actor.role === 'guard' || actor.role === 'fighter' || actor.role === 'monster';
  }

  function generateGoalCandidates(actor) {
    const goalStartMs = game && game.simStats ? perfNow() : 0;
    const candidates = [];
    const dist = (x, y) => Math.abs(x - actor.x) + Math.abs(y - actor.y);
    const finish = () => {
      if (game && game.simStats) {
        game.simStats.goalCalls++;
        game.simStats.goalMs += perfNow() - goalStartMs;
        game.simStats.candidateCount += candidates.length;
      }
      return candidates;
    };

    // Wounded units pull back to the keep to recover.
    if (needsRest(actor)) {
      insertBoundedCandidate(candidates, {
        type: 'rest', target: { ...game.castle }, utility: 260, reason: 'wounded',
      }, 4);
      return finish();
    }

    if (actor.role === 'guard') {
      // Pure defense: intercept the nearest hostile inside the defensive radius
      // (prioritising raiders bearing down on the keep). Never chase beyond it.
      let best = null, bestScore = -Infinity;
      for (let hi = 0; hi < game.hostiles.length; hi++) {
        const h = game.hostiles[hi];
        if (!h.alive) continue;
        if (distanceToCastle(h.x, h.y) > DEFENSE_RADIUS) continue;
        const score = (isEvil(h) ? 120 : 80) - dist(h.x, h.y) * 3 - distanceToCastle(h.x, h.y) * 2;
        if (score > bestScore) { bestScore = score; best = h; }
      }
      if (best) {
        insertBoundedCandidate(candidates, {
          type: 'defend', target: { x: best.x, y: best.y }, utility: bestScore, reason: `intercept ${best.name}`,
        }, 4);
        return finish();
      }
      // No threat: patrol passable ground a few tiles out from the keep so the
      // garrison visibly circles the castle. Per-guard, per-turn jitter keeps
      // them roving to different posts rather than clumping.
      const PR = 5;
      for (let dy = -PR; dy <= PR; dy++) {
        for (let dx = -PR; dx <= PR; dx++) {
          if (Math.abs(dx) + Math.abs(dy) < 2 || Math.abs(dx) + Math.abs(dy) > PR) continue;
          const x = game.castle.x + dx, y = game.castle.y + dy;
          if (x < 0 || y < 0 || x >= COLS || y >= ROWS || !isPassableForActor(x, y)) continue;
          const jitter = ((map.seed ^ Math.imul(x + actor.x + 1, 374761393) ^ Math.imul(y + actor.y + 1, 668265263) ^ Math.imul(game.subTurnSeq + 1, 2246822519)) >>> 0) / 0xffffffff;
          insertBoundedCandidate(candidates, {
            type: 'patrol', target: { x, y }, utility: 2 + jitter * 6 - dist(x, y) * 0.1, reason: 'patrol',
          }, 6);
        }
      }
      // Fallback: stand at the keep if nothing patrollable is reachable.
      insertBoundedCandidate(candidates, {
        type: 'patrol', target: { ...game.castle }, utility: 0.5, reason: 'on watch',
      }, 6);
      return finish();
    }

    if (actor.hero) {
      // Cash in: head to the keep to buy gear — but only when there's nothing
      // more urgent (no hunt/assault), so combat heroes don't abandon the front
      // for pocket change. Wounded heroes still shop via their rest visits.
      const tryShop = () => {
        if (heroCanShop(actor) && !activeLairWithin(actor.x, actor.y, 1)) {
          insertBoundedCandidate(candidates, {
            type: 'shop', target: { ...game.castle }, utility: 120 - dist(game.castle.x, game.castle.y), reason: 'buy gear',
          }, 8);
          return true;
        }
        return false;
      };
      // Delve a known ruin for treasure. Any hero will (rangers/rogues keenest);
      // a known ruin is a guaranteed find, so it outranks generic exploration.
      const tryDelve = () => {
        const ruin = nearestKnownUndelvedRuin(actor);
        if (!ruin) return false;
        const bias = actor.role === 'ranger' ? 90 : actor.role === 'rogue' ? 70 : 50;
        insertBoundedCandidate(candidates, {
          type: 'delve', target: { x: ruin.x, y: ruin.y }, utility: bias - dist(ruin.x, ruin.y) * 0.4, reason: 'old ruins',
        }, 4);
        return true;
      };
      // Bounties LURE heroes (suggestible): a posted reward makes the matching
      // goal the hero's preference, within its role — scouts chase scouting
      // flags, fighters/hunters chase kill/lair flags (only when not badly hurt,
      // so the flee system can still pull them out of a bad fight).
      const tryBountyExplore = () => {
        let best = null, bd = Infinity;
        for (const b of game.bounties) { if (b.type !== 'explore') continue; const d = dist(b.x, b.y); if (d < bd) { bd = d; best = b; } }
        if (!best) return false;
        return !!insertBoundedCandidate(candidates, { type: 'explore', target: { x: best.x, y: best.y }, utility: 210, reason: 'bounty: scout' }, 4) || true;
      };
      const tryBountyKill = () => {
        if (actor.hp < actor.maxHp * 0.5) return false;       // not while badly wounded
        let best = null, bh = null, bd = Infinity;
        for (const b of game.bounties) {
          if (b.type !== 'kill') continue;
          const h = game.hostiles.find(z => z.alive && z.id === b.hostileId);
          if (!h) continue;
          const d = dist(h.x, h.y);
          if (d < bd) { bd = d; best = b; bh = h; }
        }
        if (!best) return false;
        insertBoundedCandidate(candidates, { type: 'defend', target: { x: bh.x, y: bh.y }, utility: 210, reason: 'bounty: kill' }, 4);
        return true;
      };
      const tryBountyLair = () => {
        if (!lairAssaultReady(actor)) return false;
        let best = null, bd = Infinity;
        const comp = game.caches.component, mine = comp[idx(actor.x, actor.y)];
        for (const b of game.bounties) {
          if (b.type !== 'lair') continue;
          const l = game.lairs.find(x => x.id === b.lairId && x.active && !x.destroyed);
          if (!l || !game.discovered[idx(l.x, l.y)] || comp[idx(l.x, l.y)] !== mine) continue;
          const d = dist(l.x, l.y);
          if (d < bd) { bd = d; best = l; }
        }
        if (!best) return false;
        insertBoundedCandidate(candidates, { type: 'assault', target: { x: best.x, y: best.y }, utility: 210, reason: `bounty: the ${LAIR_DEFS[best.type].label}` }, 4);
        return true;
      };
      // Fighters and monster hunters seek out hostiles. Fighters keep within
      // reach of the realm and favour threats near the castle / raiders;
      // monster hunters range the whole map after any beast they can see.
      if (actor.role === 'fighter' || actor.role === 'monster') {
        // Player bounties first: a kill or lair flag pulls a fit combat hero.
        if (tryBountyKill()) return finish();
        if (tryBountyLair()) return finish();
        // Monster hunters make destroying a known lair their top priority once
        // strong enough — qualified heroes share the nearest-lair target and so
        // converge into a group assault.
        if (actor.role === 'monster' && lairAssaultReady(actor)) {
          const lair = nearestKnownActiveLair(actor);
          if (lair) {
            insertBoundedCandidate(candidates, {
              type: 'assault', target: { x: lair.x, y: lair.y }, utility: 200 - dist(lair.x, lair.y), reason: `the ${LAIR_DEFS[lair.type].label}`,
            }, 4);
            return finish();
          }
        }
        const range = actor.role === 'monster' ? Infinity : 24;
        let best = null, bestScore = -Infinity;
        for (let hi = 0; hi < game.hostiles.length; hi++) {
          const h = game.hostiles[hi];
          if (!h.alive || !game.visible[idx(h.x, h.y)]) continue;
          if (distanceToCastle(h.x, h.y) > range) continue;
          let score = 140 - dist(h.x, h.y) * 2 + (isEvil(h) ? 20 : 0) + (h.raider ? 50 : 0);
          if (actor.role === 'fighter') score -= distanceToCastle(h.x, h.y) * 0.6;
          if (score > bestScore) { bestScore = score; best = h; }
        }
        if (best) {
          insertBoundedCandidate(candidates, {
            type: 'defend', target: { x: best.x, y: best.y }, utility: bestScore, reason: `hunt ${best.name}`,
          }, 4);
          return finish();
        }
        // No visible threat: fighters march on a known lair if strong enough,
        // else cash in any gear money, else roam the frontier for threats.
        if (lairAssaultReady(actor)) {
          const lair = nearestKnownActiveLair(actor);
          if (lair) {
            insertBoundedCandidate(candidates, {
              type: 'assault', target: { x: lair.x, y: lair.y }, utility: 120 - dist(lair.x, lair.y), reason: `the ${LAIR_DEFS[lair.type].label}`,
            }, 4);
            return finish();
          }
        }
        if (tryShop()) return finish();
        if (tryDelve()) return finish();   // idle fighters/monster-hunters grab a ruin too
        addExploreCandidates(actor, candidates, dist);
        insertBoundedCandidate(candidates, { type: 'rest', target: { ...game.castle }, utility: 1, reason: 'idle' }, 8);
        return finish();
      }
      // Rangers and rogues explore the frontier (rogues are just cheaper, weaker
      // eyes). A scouting bounty is their top draw, then gear, ruins, roaming.
      if (tryBountyExplore()) return finish();
      if (tryShop()) return finish();
      if (tryDelve()) return finish();
      addExploreCandidates(actor, candidates, dist);
      insertBoundedCandidate(candidates, { type: 'rest', target: { ...game.castle }, utility: 0.5, reason: 'idle' }, 8);
      return finish();
    }

    // Default: idle near the castle.
    insertBoundedCandidate(candidates, {
      type: 'rest', target: { ...game.castle }, utility: 1, reason: 'idle',
    }, 4);
    return finish();
  }

  // Roam the edge of the known map: target frontier tiles (discovered cells
  // adjacent to the unknown), with per-sub-turn jitter so heroes fan out and
  // keep pushing the fog back.
  function addExploreCandidates(actor, candidates, dist) {
    const frontier = game.caches.frontier;
    for (let n = 0; n < frontier.length; n++) {
      const cell = frontier[n];
      if (!game.caches.frontierMark[cell]) continue;
      if (game && game.simStats) game.simStats.candidateCells++;
      const x = cell % COLS, y = (cell / COLS) | 0;
      const jitter = ((map.seed ^ Math.imul(x + actor.x + 1, 374761393) ^ Math.imul(y + actor.y + 1, 668265263) ^ Math.imul(game.subTurnSeq + 1, 2246822519)) >>> 0) / 0xffffffff;
      addGoalCandidate(candidates, 10, actor, 'explore', x, y, 60 - dist(x, y) * 0.4 + jitter * 12, 'frontier');
    }
  }

  function goalIsValid(actor) {
    const goal = actor.goal;
    if (!goal || !goal.target) return false;
    if ((actor.cargoFood > 0 || actor.cargoWood > 0) && goal.type !== 'deliver') return false;
    if (actor.supply <= 0 && goal.type !== 'resupply' && goal.type !== 'rest') return false;
    if (needsRest(actor) && goal.type !== 'rest') return false;
    if (actor.x === goal.target.x && actor.y === goal.target.y) return false;
    if (game.turn < goal.committedUntilTurn && goal.path && goal.path.length) return true;
    if (!goal.path || !goal.path.length) return false;
    return true;
  }

  function chooseGoal(actor) {
    if (goalIsValid(actor)) return actor.goal;
    const candidates = generateGoalCandidates(actor);
    for (const candidate of candidates) {
      const path = findPath(actor, candidate.target);
      if (!path || path.length < 2) continue;
      actor.goal = {
        type: candidate.type,
        target: candidate.target,
        path: path.slice(1),
        utility: Math.round(candidate.utility),
        reason: candidate.reason,
        committedUntilTurn: game.turn + 2,
      };
      return actor.goal;
    }
    actor.goal = null;
    return null;
  }

  function isWithinHostileTerritory(hostile, x, y) {
    if (hostile.raider) return true;  // raiders roam freely toward the castle
    return Math.abs(x - hostile.originX) + Math.abs(y - hostile.originY) <= hostile.territory;
  }

  // Whether a hostile may step onto (x,y). Movement is bounded by territory +
  // the pursuit leash; intent is shaped by goal generation (prowl/raid targets
  // stay within base territory, only a stalk reaches into the leash zone). The
  // wider movement bound also lets a beast that chased out walk back home.
  function hostileMayStep(hostile, x, y) {
    if (hostile.raider) return true;
    return Math.abs(x - hostile.originX) + Math.abs(y - hostile.originY) <= hostile.territory + HOSTILE_PURSUIT_LEASH;
  }

  function hostileGoalIsValid(hostile) {
    const goal = hostile.goal;
    if (!goal || !goal.target) return false;
    if (hostile.x === goal.target.x && hostile.y === goal.target.y) return false;
    if (!goal.path || !goal.path.length) return false;
    return true;
  }

  function addHostileCandidate(candidates, hostile, type, x, y, utility, reason, leashBonus = 0) {
    if (!isPassableForActor(x, y)) return;
    if (!hostile.raider && Math.abs(x - hostile.originX) + Math.abs(y - hostile.originY) > hostile.territory + leashBonus) return;
    insertBoundedCandidate(candidates, { type, target: { x, y }, utility, reason }, 10);
  }

  function generateHostileGoalCandidates(hostile) {
    const candidates = [];
    // Raiders are single-minded: march on the castle. Guards intercept them en
    // route via the melee lock, so they need no other goals (and skipping the
    // territory/prowl scans keeps them cheap).
    if (hostile.raider) {
      insertBoundedCandidate(candidates, {
        type: 'raid', target: { x: game.castle.x, y: game.castle.y }, utility: 1000, reason: 'the castle',
      }, 4);
      return candidates;
    }
    for (const actor of game.actors) {
      if (!actor.alive) continue;
      const dx = Math.abs(actor.x - hostile.x);
      const dy = Math.abs(actor.y - hostile.y);
      const d = Math.max(dx, dy);
      // Detect & chase any actor within wake range, even outside home territory
      // (the pursuit leash bounds how far the chase can actually go).
      if (d > HOSTILE_WAKE_RADIUS) continue;
      let utility = 120 - d * 9 + hostile.threat * 8 - actor.hp * 5;
      if (hostile.kind === 'wolf' && actor.hp < actor.maxHp) utility += 35;
      if (hostile.kind === 'bandit' && actor.id === 'guard') utility -= 45;
      if (hostile.kind === 'boar' && d > 5) utility -= 30;  // boars charge nearby prey
      if (hostile.kind === 'bear' && d > 6) utility -= 22;  // bears lumber after closer prey
      addHostileCandidate(candidates, hostile, 'stalk', actor.x, actor.y, utility, actor.name, HOSTILE_PURSUIT_LEASH);
    }

    // Evil enemies march on the settlement to raid it (animals never do).
    if (isEvil(hostile) && isWithinHostileTerritory(hostile, game.castle.x, game.castle.y)) {
      const d = Math.abs(game.castle.x - hostile.x) + Math.abs(game.castle.y - hostile.y);
      addHostileCandidate(candidates, hostile, 'raid', game.castle.x, game.castle.y, 100 + hostile.threat * 6 - d * 1.4, 'the castle');
    }

    const template = hostileTemplate(hostile.kind);
    const minX = Math.max(1, hostile.originX - hostile.territory);
    const maxX = Math.min(COLS - 2, hostile.originX + hostile.territory);
    const minY = Math.max(1, hostile.originY - hostile.territory);
    const maxY = Math.min(ROWS - 2, hostile.originY + hostile.territory);
    for (let y = minY; y <= maxY; y++) {
      for (let x = minX; x <= maxX; x++) {
        if (!isWithinHostileTerritory(hostile, x, y)) continue;
        const tKey = map.tiles[y][x];
        let utility = templatePrefers(template, tKey) ? 62 : 18;
        if (hostile.kind === 'bandit' && ROADS.has(tKey)) utility += 38;
        if (hostile.kind === 'goblin' && tKey === 'RUIN') utility += 50;
        utility -= Math.abs(x - hostile.x) + Math.abs(y - hostile.y);
        utility += ((map.seed ^ Math.imul(game.subTurnSeq + x + 3, 2246822519) ^ Math.imul(y + hostile.id.length, 3266489917)) >>> 0) / 0xffffffff;
        addHostileCandidate(candidates, hostile, 'prowl', x, y, utility, T[tKey].name);
      }
    }
    return candidates;
  }

  function chooseHostileGoal(hostile) {
    if (hostileGoalIsValid(hostile)) return hostile.goal;
    const candidates = generateHostileGoalCandidates(hostile);
    for (const candidate of candidates) {
      const path = findPath(hostile, candidate.target);
      if (!path || path.length < 2) continue;
      hostile.goal = {
        type: candidate.type,
        target: candidate.target,
        path: path.slice(1),
        utility: Math.round(candidate.utility),
        reason: candidate.reason,
      };
      return hostile.goal;
    }
    hostile.goal = null;
    return null;
  }

  // ---- d20 combat -------------------------------------------------------
  // One PRNG per turn (seeded by map seed + turn), drawn sequentially so each
  // attack/damage roll is independent yet fully reproducible. A fight is one
  // round per turn; HP pools persist across turns, so a melee plays out over
  // several turns until one side dies (or, once implemented, flees).
  // Seeded by the monotonic sub-turn counter (not the big-turn number) so each
  // of a big turn's sub-turns rolls a fresh, distinct dice sequence — yet stays
  // fully reproducible for a given seed.
  function makeCombatRng() {
    return mulberry32((map.seed ^ Math.imul(game.subTurnSeq + 1, 2654435761)) >>> 0);
  }
  function turnTag() {
    return `T${String(game.turn).padStart(2, '0')}`;
  }
  function rollD20(rng, mode) {
    // mode > 0 advantage (take higher of 2), < 0 disadvantage (take lower).
    const a = 1 + Math.floor(rng() * 20);
    if (!mode) return a;
    const b = 1 + Math.floor(rng() * 20);
    return mode > 0 ? Math.max(a, b) : Math.min(a, b);
  }
  function rollDamage(rng, dmg) {
    let total = dmg.mod || 0;
    for (let i = 0; i < dmg.n; i++) total += 1 + Math.floor(rng() * dmg.d);
    return Math.max(1, total);
  }

  // True when a unit is on terrain that favours its fighting style — grants
  // advantage on its attack rolls. Replaces the old additive terrain bonuses.
  function meleeTerrainEdge(unit, tKey) {
    if (unit.kind) {
      if ((unit.kind === 'wolf' || unit.kind === 'boar') && WOODS.has(tKey)) return true;
      if (unit.kind === 'bear' && (tKey === 'DEEPWOOD' || tKey === 'HILL' || tKey === 'MOUNTAIN')) return true;
      if (unit.kind === 'bandit' && ROADS.has(tKey)) return true;
      if (unit.kind === 'goblin' && (tKey === 'RUIN' || tKey === 'DEEPWOOD')) return true;
      return false;
    }
    if (unit.id === 'guard' && ROADS.has(tKey)) return true;
    if (unit.id === 'hunter' && WOODS.has(tKey)) return true;
    if (tKey === 'CASTLE') return true;
    return false;
  }

  // Resolve a single attack. `bias` adds to the advantage mode (e.g. +1 when
  // the defender is fleeing and exposes its back). Returns a detail object
  // {dmg, roll, total, mode, hit, crit} for the battle log; mutates defender
  // hp/alive on a hit.
  function meleeAttack(attacker, defender, rng, bias) {
    const tKey = map.tiles[attacker.y][attacker.x];
    let mode = bias || 0;
    if (meleeTerrainEdge(attacker, tKey)) mode += 1;
    mode = mode > 0 ? 1 : (mode < 0 ? -1 : 0);
    const roll = rollD20(rng, mode);
    const crit = roll === 20;
    const hit = crit || (roll !== 1 && roll + attacker.atk >= defender.ac);
    let dmg = 0;
    if (hit) {
      dmg = rollDamage(rng, attacker.dmg);
      if (crit) dmg += rollDamage(rng, attacker.dmg); // crit: extra dice
      defender.hp -= dmg;
      if (defender.hp <= 0) {
        defender.hp = 0;
        defender.alive = false;
      }
    }
    return { dmg, roll, total: roll + attacker.atk, mode, hit, crit };
  }

  // One line of the detailed battle log describing a single swing.
  function logAttackLine(battleLog, attacker, defender, r) {
    const adv = r.mode > 0 ? ' adv' : (r.mode < 0 ? ' dis' : '');
    if (!r.hit) {
      battleLog.push(`  ${attacker.name} missed ${defender.name} (d${r.roll}${adv}).`);
      return;
    }
    const tag = r.crit ? 'CRIT ' : '';
    const fate = defender.alive ? `${defender.name} ${defender.hp}/${defender.maxHp}` : `${defender.name} DOWN`;
    battleLog.push(`  ${attacker.name} ${tag}hit ${defender.name} (d${r.roll}${adv}) ${r.dmg} dmg, ${fate}.`);
  }

  // How much a hero's fight XP is scaled by its role / the foe. Monster-hunters
  // weight by taxonomy (less for beasts, more for monsters); other classes use
  // a flat per-class multiplier.
  function fightXpMul(actor, hostile) {
    if (actor.role === 'monster') {
      const cat = hostileTemplate(hostile.kind).category || 'beast';
      return MONSTER_HUNTER_XP_MUL[cat] || 1;
    }
    return HERO_TEMPLATES[actor.role].fightXpMul ?? 1;
  }

  function rewardForKill(actor, hostile, events) {
    if (actor.hero) {
      gainXp(actor, Math.max(1, Math.round((XP_PER_KILL[hostile.kind] || 8) * fightXpMul(actor, hostile))), events);
      // Loot goes into the hero's personal purse — wilderness gold entering the
      // world. It returns to the treasury later when the hero spends at a shop.
      const loot = LOOT_PER_KILL[hostile.kind] || 3;
      actor.purse += loot;
      game.wildGold += loot;
      const kb = killBountyOn(hostile);   // claim a posted kill bounty (escrowed coin)
      if (kb) {
        actor.purse += kb.reward;
        events.push(`${actor.name} claims a kill bounty (+${kb.reward} gold).`);
        game.bounties = game.bounties.filter(x => x !== kb);
      }
    } else {
      actor.xp = (actor.xp || 0) + 1;        // guards: token tally, no leveling
      game.coin += GUARD_KILL_COIN;          // salaried troops: a small treasury trickle
    }
    events.push(`${actor.name} killed ${hostile.name}.`);
  }

  // A hero hammers a lair structure (auto-hit — a building doesn't dodge). The
  // lair's brood defends it in normal melee; this fires only when no foe is
  // adjacent, so heroes clear defenders first, then demolish the den.
  function attackLair(actor, lair, rng, events, battleLog) {
    const dmg = rollDamage(rng, actor.dmg);
    lair.hp -= dmg;
    const def = LAIR_DEFS[lair.type];
    battleLog.push(`${turnTag()} ${actor.name} strikes the ${def.label} (${dmg}) ${Math.max(0, lair.hp)}/${lair.maxHp}.`);
    if (lair.hp <= 0) destroyLair(lair, events);
  }
  function destroyLair(lair, events) {
    lair.active = false;
    lair.destroyed = true;
    lair.hp = 0;
    game.lairsCleared = (game.lairsCleared || 0) + 1;
    const def = LAIR_DEFS[lair.type];
    // Reward split: a loot purse and an XP pool, both shared among the heroes who
    // pressed the assault (within 2 tiles of the fallen lair). The gold lands in
    // their purses — it reaches the treasury when they spend it.
    const near = game.actors.filter(a => a.alive && a.hero
      && Math.max(Math.abs(a.x - lair.x), Math.abs(a.y - lair.y)) <= 2);
    const n = Math.max(1, near.length);
    const lootShare = Math.round(LAIR_LOOT / n);          // minted wilderness gold
    const lb = lairBountyOn(lair);                        // + any escrowed bounty (recycled coin)
    if (lb) game.bounties = game.bounties.filter(x => x !== lb);
    const bountyShare = lb ? Math.round(lb.reward / n) : 0;
    for (const a of near) {
      a.purse += lootShare + bountyShare;
      game.wildGold += lootShare;
      gainXp(a, Math.max(1, Math.round((LAIR_XP_POOL / n) * fightXpMul(a, { kind: lair.kind }))), events);
    }
    if (events) events.push(`The ${def.label} is destroyed! (${LAIR_LOOT + (lb ? lb.reward : 0)} loot)`);
  }

  function pushCombat(combats, actor, hostile) {
    combats.push({
      actor,
      hostile,
      actorX: actor.x,
      actorY: actor.y,
      hostileX: hostile.x,
      hostileY: hostile.y,
    });
  }

  // At most this many hostiles can pile onto one actor in a single round —
  // models how many bodies physically fit around a tile, and caps burst
  // damage so a swarm wounds rather than instantly deletes.
  const PACK_CAP = 4;

  // One combat round per actor: the actor strikes its most dangerous adjacent
  // foe, then the surrounding pack strikes back. Two or more flanking hostiles
  // attack with advantage; a fleeing actor also grants its attackers advantage.
  function resolveActorMelee(actor, adj, rng, events, combats, battleLog) {
    // Actor focus-fires the toughest adjacent hostile.
    let target = adj[0];
    for (let k = 1; k < adj.length; k++) {
      if (adj[k].threat > target.threat) target = adj[k];
    }
    const foes = adj.map(h => h.name).join(', ');
    battleLog.push(`${turnTag()} ${actor.name}${actor.fleeing ? ' (fleeing)' : ''} vs ${foes}`);
    pushCombat(combats, actor, target);
    const strike = meleeAttack(actor, target, rng, 0);
    logAttackLine(battleLog, actor, target, strike);
    // Fight XP is mostly damage-dealt, so a hero is rewarded for swinging even
    // when a guard or ally lands the killing blow (no kill-stealing penalty).
    if (actor.hero && strike.dmg > 0) {
      gainXp(actor, Math.round(strike.dmg * DMG_XP * fightXpMul(actor, target)), events);
    }
    if (!target.alive) rewardForKill(actor, target, events);
    else if (strike.dmg > 0) events.push(`${actor.name} wounded ${target.name} (${strike.dmg}).`);

    // Pack riposte. Flanking advantage when 2+ hostiles surround the actor;
    // fleeing exposes the actor's back for further advantage.
    const bias = (adj.length >= 2 ? 1 : 0) + (actor.fleeing ? 1 : 0);
    let attackers = 0;
    let totalTaken = 0;
    let lastAttacker = null;
    for (let k = 0; k < adj.length && attackers < PACK_CAP; k++) {
      const h = adj[k];
      if (!h.alive) continue; // may have just been killed by the actor's strike
      if (h !== target) pushCombat(combats, actor, h);
      const swing = meleeAttack(h, actor, rng, bias);
      logAttackLine(battleLog, h, actor, swing);
      totalTaken += swing.dmg;
      attackers++;
      lastAttacker = h;
      if (!actor.alive) {
        events.push(`${actor.name} died fighting ${h.name}.`);
        return;
      }
    }
    if (totalTaken > 0) {
      const who = attackers > 1 ? `${attackers} attackers` : lastAttacker.name;
      events.push(`${actor.name} was hurt by ${who} (${totalTaken}).`);
    }
  }

  function resolveCombats(events, combats, battleLog) {
    if (!game.hostiles.length) return;
    const rng = makeCombatRng();
    for (let ai = 0; ai < game.actors.length; ai++) {
      const actor = game.actors[ai];
      if (!actor.alive) continue;
      // Gather every adjacent living hostile — the whole pack engages at once.
      const adj = [];
      for (let hi = 0; hi < game.hostiles.length; hi++) {
        const h = game.hostiles[hi];
        if (!h.alive) continue;
        if (Math.max(Math.abs(actor.x - h.x), Math.abs(actor.y - h.y)) <= 1) adj.push(h);
      }
      if (adj.length) {
        resolveActorMelee(actor, adj, rng, events, combats, battleLog);
      } else if (actor.hero) {
        // No foe adjacent — if the hero is on/next to an active lair, demolish it.
        const lair = activeLairWithin(actor.x, actor.y, 1);
        if (lair) attackLair(actor, lair, rng, events, battleLog);
      }
    }
  }

  // Melee lock: an adjacent living enemy pins a unit in place (zone of
  // control), so a fight stays joined across turns instead of units sliding
  // past each other in a single round. Cheap linear scans (≤4 actors, and only
  // awake hostiles are ever queried).
  function adjacentLivingHostile(actor) {
    for (let i = 0; i < game.hostiles.length; i++) {
      const h = game.hostiles[i];
      if (!h.alive) continue;
      if (Math.max(Math.abs(actor.x - h.x), Math.abs(actor.y - h.y)) <= 1) return h;
    }
    return null;
  }
  function adjacentLivingActor(hostile) {
    for (let i = 0; i < game.actors.length; i++) {
      const a = game.actors[i];
      if (!a.alive) continue;
      if (Math.max(Math.abs(hostile.x - a.x), Math.abs(hostile.y - a.y)) <= 1) return a;
    }
    return null;
  }
  function adjacentLivingHostiles(actor) {
    const list = [];
    for (let i = 0; i < game.hostiles.length; i++) {
      const h = game.hostiles[i];
      if (!h.alive) continue;
      if (Math.max(Math.abs(actor.x - h.x), Math.abs(actor.y - h.y)) <= 1) list.push(h);
    }
    return list;
  }

  // ---- threat perception ------------------------------------------------
  // Rough combat strength of a unit, used to decide fight-or-flee. Average
  // damage of n d(d) is n*(d+1)/2; add attack accuracy and a slice of HP.
  function unitPower(u) {
    const avgDmg = u.dmg.n * (u.dmg.d + 1) / 2 + (u.dmg.mod || 0);
    return avgDmg + u.atk * 0.6 + u.hp * 0.35;
  }

  const DANGER_RADIUS = 6;
  const DANGER_AVERSION = 4; // pathfinding penalty per unit of danger (non-guard)

  // Per-turn danger field: each hostile the team can currently see stamps a
  // linear falloff of its threat into nearby cells. Actors route around it and
  // weigh it when picking goals; guards ignore it (they hunt instead). Bounded
  // stamping keeps this ~O(hostiles * radius^2), a few thousand ops per turn.
  function buildDangerMap() {
    const danger = game.danger;
    danger.fill(0);
    for (let i = 0; i < game.hostiles.length; i++) {
      const h = game.hostiles[i];
      if (!h.alive || !game.visible[idx(h.x, h.y)]) continue;
      const weight = unitPower(h);
      const minY = Math.max(0, h.y - DANGER_RADIUS);
      const maxY = Math.min(ROWS - 1, h.y + DANGER_RADIUS);
      const minX = Math.max(0, h.x - DANGER_RADIUS);
      const maxX = Math.min(COLS - 1, h.x + DANGER_RADIUS);
      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          const d = Math.max(Math.abs(x - h.x), Math.abs(y - h.y));
          if (d > DANGER_RADIUS) continue;
          danger[idx(x, y)] += weight * (1 - d / DANGER_RADIUS);
        }
      }
    }
  }

  // Decide whether an actor should break off and run. Flee when badly wounded,
  // or when the surrounding pack clearly outmatches the actor. Guards hold
  // ground far more stubbornly than the squishier roles.
  function shouldFlee(actor, threats) {
    if (!threats.length) return false;
    if (actor.role === 'guard') return false;  // garrison holds the line
    let enemyPower = 0;
    for (let i = 0; i < threats.length; i++) enemyPower += unitPower(threats[i]);
    // Scale the actor's effective strength by remaining HP fraction.
    const self = unitPower(actor) * (0.4 + 0.6 * (actor.hp / actor.maxHp));
    const stubbornness = (actor.role === 'guard' || actor.role === 'fighter') ? 1.8
      : actor.role === 'monster' ? 1.5 : 0.9;  // rangers/rogues flee readily
    if (actor.hp <= actor.maxHp * 0.3) return true;
    return enemyPower > self * stubbornness;
  }

  // Retreat toward the castle (the heal/resupply haven). Recomputed each turn
  // because the danger field shifts; danger-aware pathfinding routes the
  // escape around other hostiles where possible. Returns null if cornered
  // (no path home), in which case the caller falls back to standing and
  // fighting rather than taking the fleeing penalty for nothing.
  function ensureFleeGoal(actor) {
    const path = findPath(actor, game.castle);
    if (path && path.length >= 2) {
      actor.goal = {
        type: 'flee',
        target: { ...game.castle },
        path: path.slice(1),
        utility: 999,
        reason: 'fleeing',
        committedUntilTurn: game.turn + 1,
      };
      return actor.goal;
    }
    return null;
  }

  function resolveGoalArrival(actor, events) {
    const goal = actor.goal;
    if (!goal || actor.x !== goal.target.x || actor.y !== goal.target.y) return;
    const tileIndex = idx(actor.x, actor.y);
    const tile = map.tiles[actor.y][actor.x];

    if (goal.type === 'resupply' || goal.type === 'rest') {
      actor.supply = actor.maxSupply;
      actor.hp = actor.maxHp;
    } else if (goal.type === 'flee') {
      // Reached the castle alive — recover and shake off the pursuit.
      actor.supply = actor.maxSupply;
      actor.hp = actor.maxHp;
      actor.fleeing = false;
      events.push(`${actor.name} escaped to the castle.`);
    } else if (goal.type === 'delve') {
      delveRuin(actor, events); // claim the ruin's treasure on arrival
    }

    actor.goal = null;
  }

  const SUBTURNS = 4;

  // The strategic beat. Once per big turn: cycle the season, let the Steward
  // act, tick the economy, then resolve SUBTURNS sub-turns of movement/combat.
  // `events` accumulates the digest across all sub-turns.
  function bigTurnEconomy(events) {
    game.turn += 1;
    game.lastShopIncome = 0; // shop tax captured during this big turn's sub-turns
    // Seasons turn over every 10-20 big turns; the opening is summer.
    if (game.turn > game.seasonEnds) {
      game.season = game.season === 'summer' ? 'winter' : 'summer';
      game.seasonCount++;
      game.seasonEnds += rollSeasonLength(game.seasonCount);
      events.push(game.season === 'winter' ? 'Winter closes in over the marches.' : 'Spring thaws the marches.');
      displaceStrandedUnits(events); // evacuate anyone on now-impassable ice/peaks
    }
    // Clear the fallen so the hostile list stays bounded across raid waves.
    game.hostiles = game.hostiles.filter(h => h.alive);
    // Regenerating monsters (trolls) knit their wounds between big turns.
    for (const h of game.hostiles) if (h.alive && h.regen && h.hp < h.maxHp) h.hp = Math.min(h.maxHp, h.hp + h.regen);
    runSteward();
    economyTick(events);
    maintainGarrison(events);
    maybeRaid(events);
    tickLairs(events);
    sweepBounties(events);   // refund flags whose target is gone
  }

  // Resolved after a big turn's sub-turns: raiders at the gates harm the city.
  function endBigTurn(events) {
    resolveSiege(events);
    if (game.population <= 0) game.gameOver = true; // the holding has fallen
  }

  // One sub-turn: movement + combat for every unit. No economy here.
  function computeTurnPlan(options = null) {
    if (!game || viewMode !== 'world') return;
    game.subTurnSeq++;  // advance the per-sub-turn RNG stream
    pendingLevelFlashes = [];
    const turnStartMs = game.simStats ? perfNow() : 0;
    const recordMoves = !options || options.recordMoves !== false;
    const events = (options && options.events) || [];
    const moves = [];
    const hostileMoves = [];
    const combats = [];
    const battleLog = [];
    buildDangerMap();

    // ---- occupancy: no unit shares a cell (combat happens on adjacent cells).
    // Stackable cells (the keep; villages/dungeons later) are exempt for the
    // player's actors. `occ` holds every living unit off a stackable cell and is
    // kept current as units move, so each ordinary cell holds at most one unit.
    // This naturally caps how many raiders can ring the keep (its 8 neighbours),
    // and the garrison wall in resolveSiege then turns that assault away.
    const occ = new Set();
    for (const u of game.actors) if (u.alive && !isStackable(u.x, u.y)) occ.add(idx(u.x, u.y));
    for (const u of game.hostiles) if (u.alive && !isStackable(u.x, u.y)) occ.add(idx(u.x, u.y));
    pathOccupancy = occ; // pathfinding routes around occupied cells while resolving
    const isActorUnit = (u) => !u.kind; // hostiles carry a `kind`; actors don't
    const blockedByOccupancy = (unit, nx, ny) => {
      if (isStackable(nx, ny)) {
        if (isActorUnit(unit)) return false;            // heroes/guards pile up at the keep
        return game.actors.some(a => a.alive && a.x === nx && a.y === ny); // defenders hold the gate
      }
      return occ.has(idx(nx, ny));
    };
    const commitActorOcc = (oldX, oldY, nx, ny) => {
      if (!isStackable(oldX, oldY)) occ.delete(idx(oldX, oldY));
      if (!isStackable(nx, ny)) occ.add(idx(nx, ny));
    };

    for (const actor of game.actors) {
      if (!actor.alive) continue;
      // A hero standing at the keep spends its purse here (the goal system can't
      // path to a tile it's already on, so shopping must be triggered directly).
      if (actor.hero && actor.x === game.castle.x && actor.y === game.castle.y) heroShop(actor, events);
      // Badly wounded far from the keep: quaff a carried potion to stay in the
      // fight rather than make the long retreat (keep-side heroes heal for free).
      if (actor.hero && (actor.potions || 0) > 0 && needsRest(actor) && distanceToCastle(actor.x, actor.y) > DEFENSE_RADIUS) {
        actor.potions--;
        actor.hp = Math.min(actor.maxHp, actor.hp + Math.round(actor.maxHp * POTION_HEAL_FRAC));
        events.push(`${actor.name} quaffs a potion.`);
      }
      // Any hero standing on an undelved ruin claims its treasure (incidental;
      // the delve goal deliberately routes rangers/rogues here).
      if (actor.hero) delveRuin(actor, events);
      const startX = actor.x;
      const startY = actor.y;
      const path = recordMoves ? [{ x: actor.x, y: actor.y }] : null;
      // Fight-or-flight: with hostiles in reach, the actor either stands and
      // fights (melee lock — combat resolves in the combat phase) or, if
      // outmatched, breaks off and runs for the castle. Fleeing past adjacent
      // foes exposes its back (attackers get advantage, wired in combat).
      const threats = adjacentLivingHostiles(actor);
      let fleeing = threats.length > 0 && shouldFlee(actor, threats);
      let goal;
      if (fleeing) {
        goal = ensureFleeGoal(actor);
        if (!goal) fleeing = false; // cornered: nowhere to run, so hold ground
      }
      if (!fleeing) {
        goal = threats.length ? actor.goal : chooseGoal(actor); // pinned stands
      }
      actor.fleeing = fleeing;
      // A healthy hero on/next to an active lair holds position to keep
      // demolishing it (combat resolves the strike); wounded ones break for the
      // keep via the rest goal instead.
      const atLair = actor.hero && !needsRest(actor) && !!activeLairWithin(actor.x, actor.y, 1);
      const pinned = (threats.length > 0 && !fleeing) || atLair;
      let movementBudget = pinned ? 0 : actor.steps;
      let spentMovement = 0;
      while (movementBudget > 0) {
        if (!actor.goal || !actor.goal.path || !actor.goal.path.length) break;
        const next = actor.goal.path.shift();
        if (!isPassableForActor(next.x, next.y)) {
          actor.goal = null;
          break;
        }
        const moveCost = stepCostForActor(actor, { x: actor.x, y: actor.y }, next, false);
        if (moveCost > movementBudget) {
          actor.goal.path.unshift(next);
          break;
        }
        if (blockedByOccupancy(actor, next.x, next.y)) {
          actor.goal = null; // someone's parked there — re-path around them next sub-turn
          break;
        }
        commitActorOcc(actor.x, actor.y, next.x, next.y);
        actor.x = next.x;
        actor.y = next.y;
        movementBudget -= moveCost;
        spentMovement += moveCost;
        if (recordMoves) path.push({ x: actor.x, y: actor.y });
      }
      if (actor.x !== game.castle.x || actor.y !== game.castle.y) {
        actor.supply = Math.max(0, actor.supply - 1);
      }
      if (actor.x !== startX || actor.y !== startY) {
        const goalText = goal ? `${goal.type} goal` : actor.role;
        events.push(`${actor.name} followed ${goalText} to ${actor.x},${actor.y} (${spentMovement.toFixed(1)}/${actor.steps.toFixed(1)} mp).`);
      }
      // A fleeing actor that shook every adjacent foe (without reaching the
      // castle, which logs its own escape) broke contact this turn.
      if (fleeing && (actor.x !== game.castle.x || actor.y !== game.castle.y)
          && adjacentLivingHostiles(actor).length === 0) {
        events.push(`${actor.name} broke off and fled.`);
      }
      const tileIndex = idx(actor.x, actor.y);
      const tile = map.tiles[actor.y][actor.x];
      if (tile === 'RUIN') game.discoveredRuins.add(tileIndex);
      // Rangers earn XP for opening the map — credited for tiles their vision
      // is about to reveal this sub-turn (counted before visibility refreshes).
      if (actor.hero && actor.role === 'ranger') {
        const revealed = undiscoveredInRadius(actor.x, actor.y, actor.vision);
        if (revealed > 0) gainXp(actor, Math.min(EXPLORE_XP_CAP, Math.round(revealed * EXPLORE_XP_RATE)), events);
      }
      // Claim a scouting bounty whose region this hero has now reached/sighted.
      if (actor.hero && game.bounties.length) {
        for (const b of game.bounties) {
          if (b.type !== 'explore') continue;
          if (Math.max(Math.abs(b.x - actor.x), Math.abs(b.y - actor.y)) <= actor.vision) {
            actor.purse += b.reward;
            events.push(`${actor.name} claims a scouting bounty (+${b.reward} gold).`);
            game.bounties = game.bounties.filter(x => x !== b);
            break;
          }
        }
      }
      resolveGoalArrival(actor, events);
      if (recordMoves) {
        moves.push({
          actor,
          path,
          startHp: actor.hp,
          startAlive: true,
          spentMovement,
          finalHp: actor.hp,
          finalAlive: actor.alive,
        });
      }
    }
    for (const hostile of game.hostiles) {
      if (!hostile.alive) continue;
      // Sleep optimisation: hostiles outside engagement range of the castle or
      // any living villager skip pathfinding and movement entirely. On wake-up,
      // clear the stale goal so it re-evaluates against current positions.
      if (!hostileIsAwake(hostile)) {
        hostile.goal = null;
        if (recordMoves) hostileMoves.push({
          hostile,
          path: [{ x: hostile.x, y: hostile.y }],
          startHp: hostile.hp, startAlive: true,
          spentMovement: 0, finalHp: hostile.hp, finalAlive: true,
        });
        continue;
      }
      const path = recordMoves ? [{ x: hostile.x, y: hostile.y }] : null;
      // Melee lock: stay and fight an adjacent actor rather than re-pathing.
      const pinned = adjacentLivingActor(hostile);
      if (!pinned) chooseHostileGoal(hostile);
      let movementBudget = pinned ? 0 : hostile.steps;
      let spentMovement = 0;
      while (movementBudget > 0) {
        if (!hostile.goal || !hostile.goal.path || !hostile.goal.path.length) break;
        const next = hostile.goal.path.shift();
        if (!isPassableForActor(next.x, next.y) || !hostileMayStep(hostile, next.x, next.y)) {
          hostile.goal = null;
          break;
        }
        const moveCost = stepCostForActor(hostile, { x: hostile.x, y: hostile.y }, next, false);
        if (moveCost > movementBudget) {
          hostile.goal.path.unshift(next);
          break;
        }
        if (blockedByOccupancy(hostile, next.x, next.y)) {
          hostile.goal = null; // cell taken — re-path around it next sub-turn
          break;
        }
        commitActorOcc(hostile.x, hostile.y, next.x, next.y);
        hostile.x = next.x;
        hostile.y = next.y;
        movementBudget -= moveCost;
        spentMovement += moveCost;
        if (recordMoves) path.push({ x: hostile.x, y: hostile.y });
      }
      if (hostile.goal && hostile.x === hostile.goal.target.x && hostile.y === hostile.goal.target.y) {
        hostile.goal = null;
      }
      if (recordMoves) {
        hostileMoves.push({
          hostile,
          path,
          startHp: hostile.hp,
          startAlive: true,
          spentMovement,
          finalHp: hostile.hp,
          finalAlive: hostile.alive,
        });
      }
    }
    if (!recordMoves) {
      // Reveal destinations before combat deaths, matching the animated turn flow.
      updateVisibility();
    }
    resolveCombats(events, combats, battleLog);
    // Newest engagements on top; keep a bounded scrollback for the report.
    if (battleLog.length) {
      game.battleLog.unshift(...battleLog);
      game.battleLog = game.battleLog.slice(0, 80);
    }
    if (recordMoves) {
      for (const move of moves) {
        move.finalHp = move.actor.hp;
        move.finalAlive = move.actor.alive;
        move.actor.hp = move.startHp;
        move.actor.alive = move.startAlive;
      }
      for (const move of hostileMoves) {
        move.finalHp = move.hostile.hp;
        move.finalAlive = move.hostile.alive;
        move.hostile.hp = move.startHp;
        move.hostile.alive = move.startAlive;
      }
      updateVisibility();
    }
    game.log = events.length ? events[0] : 'The marches are quiet.';
    if (game.simStats) {
      game.simStats.turns++;
      game.simStats.turnMs += perfNow() - turnStartMs;
    }
    // Heroes sit at their final cells here (positions aren't restored), so grab
    // level-up flash coords now for the animation to play green.
    const levelFlashes = pendingLevelFlashes.filter(a => a.alive).map(a => ({ x: a.x, y: a.y, glyph: a.glyph }));
    pathOccupancy = null;
    return { events, moves, hostileMoves, combats, battleLog, levelFlashes };
  }

  function isMajorEvent(event) {
    return /hurt|died|killed|fighting|searched old ruins/i.test(event);
  }

  function logTurnReport(turnLabel, plan) {
    const actorLines = game.actors.map(actor => {
      const state = actor.alive ? `HP ${actor.hp}, supply ${actor.supply}` : 'dead';
      const goal = actor.goal ? `${actor.goal.type} ${actor.goal.target.x},${actor.goal.target.y}` : 'idle';
      return `${actor.name}: ${actor.x},${actor.y}; ${state}; goal ${goal}`;
    });
    const hostileLines = game.hostiles.map(hostile => {
      const state = hostile.alive ? `HP ${hostile.hp}` : 'dead';
      const goal = hostile.goal ? `${hostile.goal.type} ${hostile.goal.target.x},${hostile.goal.target.y}` : 'idle';
      return `${hostile.name}: ${hostile.x},${hostile.y}; ${state}; goal ${goal}`;
    });
    const eventLines = plan.events.length ? plan.events : ['No major events.'];
    console.groupCollapsed(`[LoR] ${turnLabel} report`);
    console.log(['Events:', ...eventLines.map(event => `- ${event}`), 'Actors:', ...actorLines.map(line => `- ${line}`), 'Hostiles:', ...hostileLines.map(line => `- ${line}`)].join('\n'));
    console.groupEnd();
  }

  // Apply one resolved sub-turn to the live state (final positions, HP,
  // deaths) and refresh visibility. No reporting — the big-turn controller
  // handles the digest once all sub-turns are done.
  function finishSubTurn(plan) {
    fightFlashCells = null;
    for (const move of plan.moves) {
      const end = move.path[move.path.length - 1];
      move.actor.x = end.x;
      move.actor.y = end.y;
      move.actor.hp = move.finalHp;
      move.actor.alive = move.finalAlive;
    }
    for (const move of plan.hostileMoves) {
      const end = move.path[move.path.length - 1];
      move.hostile.x = end.x;
      move.hostile.y = end.y;
      move.hostile.hp = move.finalHp;
      move.hostile.alive = move.finalAlive;
    }
    updateVisibility();
  }

  // End of a big turn: digest the accumulated sub-turn events into the report
  // log and hand control back to the player (no auto-advance).
  function finishBigTurn(digest) {
    const turnLabel = `T${String(game.turn).padStart(2, '0')}`;
    const major = digest.filter(isMajorEvent);
    const summary = major.length ? major[0]
      : (digest.length ? `${digest.length} actions resolved.` : 'The marches are quiet.');
    game.log = `${turnLabel} ${summary}`;
    const lines = [`${turnLabel} ${summary}`, ...major.slice(1, 5).map(e => `   ${e}`)];
    game.reports.unshift(...lines);
    game.reports = game.reports.slice(0, 24);
    highlightedTile = null;
    isAnimatingTurn = false;
    viewMode = game.gameOver ? 'gameover' : (major.length ? 'report' : 'world');  // surface notable turns
    render(map);
  }

  function setFightFlashCells(combats, reverseOrder) {
    const cells = [];
    for (const combat of combats) {
      if (reverseOrder) {
        cells.push({ x: combat.hostileX, y: combat.hostileY, glyph: combat.hostile.glyph });
        cells.push({ x: combat.actorX, y: combat.actorY, glyph: combat.actor.glyph });
      } else {
        cells.push({ x: combat.actorX, y: combat.actorY, glyph: combat.actor.glyph });
        cells.push({ x: combat.hostileX, y: combat.hostileY, glyph: combat.hostile.glyph });
      }
    }
    fightFlashCells = cells;
  }

  function flashCombats(plan, done) {
    if (!plan.combats.length) {
      done();
      return;
    }
    let phase = 0;
    const flashTick = () => {
      if (phase >= 4) {
        fightFlashCells = null;
        render(map);
        done();
        return;
      }
      if (phase & 1) fightFlashCells = null;
      else setFightFlashCells(plan.combats, phase === 2);
      render(map);
      phase += 1;
      window.setTimeout(flashTick, 80);
    };
    flashTick();
  }

  // Green pulse over heroes that just leveled up (same beat as the fight flash).
  function flashLevelUps(plan, done) {
    if (!plan.levelFlashes || !plan.levelFlashes.length) {
      done();
      return;
    }
    let phase = 0;
    const tick = () => {
      if (phase >= 4) {
        levelFlashCells = null;
        render(map);
        done();
        return;
      }
      levelFlashCells = (phase & 1) ? null : plan.levelFlashes;
      render(map);
      phase += 1;
      window.setTimeout(tick, 90);
    };
    tick();
  }

  // Animate one sub-turn. Units move ONE AT A TIME, in the exact order they
  // were resolved in computeTurnPlan (friendly actors first, then hostiles) —
  // so the playback mirrors the actual turn order rather than everyone sliding
  // at once. Per-tile speed scales with how many tiles must be covered so a
  // crowded raid turn stays snappy.
  function animateTurn(plan, onDone) {
    viewMode = 'world';
    highlightedTile = null;
    const allMoves = plan.moves.concat(plan.hostileMoves);
    const finish = () => { finishSubTurn(plan); if (onDone) onDone(); };
    const afterMoves = () => flashCombats(plan, () => flashLevelUps(plan, finish));
    // Visibility here reflects FINAL positions (computeTurnPlan refreshed it), so
    // capture which movers the player can actually watch before we snap to start.
    for (const move of allMoves) {
      move._visible = move.path.some(p => game.visible[idx(p.x, p.y)]);
    }
    // Snap every unit to its starting cell so the board shows the pre-move state.
    for (const move of allMoves) {
      const unit = move.actor || move.hostile;
      unit.x = move.path[0].x;
      unit.y = move.path[0].y;
    }
    updateVisibility();
    render(map);
    // Animate only movers the player can see; ones travelling entirely in fog
    // are skipped (finishSubTurn drops them at their final cell regardless).
    const movers = allMoves.filter(move => move.path.length > 1 && move._visible);
    if (movers.length === 0) { afterMoves(); return; }
    const totalTiles = movers.reduce((sum, m) => sum + m.path.length - 1, 0);
    const BUDGET_MS = 2600; // rough wall-clock target for the whole sub-turn
    const STEP_MS = Math.max(30, Math.min(95, Math.floor(BUDGET_MS / Math.max(1, totalTiles))));
    const GAP_MS = Math.max(18, Math.floor(STEP_MS * 0.55)); // beat as the turn passes on
    let mi = 0;
    const animateMover = () => {
      if (mi >= movers.length) { afterMoves(); return; }
      const move = movers[mi];
      const unit = move.actor || move.hostile;
      let frame = 0;
      const tick = () => {
        frame += 1;
        const pos = move.path[Math.min(frame, move.path.length - 1)];
        unit.x = pos.x;
        unit.y = pos.y;
        updateVisibility();
        render(map);
        if (frame < move.path.length - 1) {
          window.setTimeout(tick, STEP_MS);
        } else {
          mi += 1;
          window.setTimeout(animateMover, GAP_MS);
        }
      };
      window.setTimeout(tick, STEP_MS);
    };
    animateMover();
  }

  // The player takes one big turn: economy ticks, then SUBTURNS sub-turns
  // resolve and animate in sequence. Control returns afterward — no auto-advance.
  function advanceTurn() {
    if (!game || viewMode !== 'world' || isAnimatingTurn) return;
    isAnimatingTurn = true;
    const digest = [];
    bigTurnEconomy(digest);
    const runSub = (i) => {
      if (i >= SUBTURNS) { endBigTurn(digest); finishBigTurn(digest); return; }
      const plan = computeTurnPlan({ recordMoves: true });
      digest.push(...plan.events);
      animateTurn(plan, () => runSub(i + 1));
    };
    runSub(0);
  }

  function ensureGridCells() {
    const count = viewCols * viewRows;
    mapEl.style.setProperty('--view-cols', viewCols);
    if (gridCells.length === count) return;

    gridCells = [];
    gridCellState = [];
    edgeActorCells = new Int16Array(count);
    mapEl.textContent = '';
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      gridCells.push(s);
      gridCellState.push({ ch: '', fg: '', bg: '', x: null, y: null, t: '', view: '' });
      frag.appendChild(s);
    }
    mapEl.appendChild(frag);
  }

  function setGridCell(i, ch, fg, bg, meta = null) {
    const s = gridCells[i];
    const state = gridCellState[i];
    if (state.ch !== ch) {
      s.textContent = ch;
      state.ch = ch;
    }
    if (state.fg !== fg) {
      s.style.color = fg;
      state.fg = fg;
    }
    if (state.bg !== bg) {
      s.style.background = bg;
      state.bg = bg;
    }
    const x = meta && meta.x !== undefined ? meta.x : null;
    const y = meta && meta.y !== undefined ? meta.y : null;
    const t = meta && meta.t !== undefined ? meta.t : '';
    const view = meta && meta.view !== undefined ? meta.view : '';
    if (state.x !== x) {
      if (x === null) s.removeAttribute('data-x');
      else s.dataset.x = x;
      state.x = x;
    }
    if (state.y !== y) {
      if (y === null) s.removeAttribute('data-y');
      else s.dataset.y = y;
      state.y = y;
    }
    if (state.t !== t) {
      if (!t) s.removeAttribute('data-t');
      else s.dataset.t = t;
      state.t = t;
    }
    if (state.view !== view) {
      if (!view) s.removeAttribute('data-view');
      else s.dataset.view = view;
      state.view = view;
    }
  }

  // Render the dense top resource bar and bottom status bar. Called by the
  // world view; the bars are hidden whenever a full-screen panel is active.
  function renderBars() {
    let resourceBar;
    if (game) {
      const stamped = !/[^0-9]/.test(BUILD_REV);
      const rev = stamped ? `r${BUILD_REV}` : 'dev';
      
      const left = `(${rev}) Pop ${game.population}/${housingCap()} Coin ${game.coin} Food ${Math.floor(game.food)} ${game.season === 'winter' ? '❄' : '☀'}`;
      const btn = isAnimatingTurn ? 'Wait... ' : 'Next turn ';
      const pad = Math.max(1, barCols - 1 - left.length - btn.length);
      resourceBar = left + ' '.repeat(pad) + btn;
    } else {
      resourceBar = 'COIN  FOOD';
    }
    writeBar(topbarEl, topbarCellsRef, topbarStateRef, ` ${resourceBar}`, '#11130f', '#d6bb7a');
    writeBar(botbarEl, botbarCellsRef, botbarStateRef, ` ${describeTile(highlightedTile)}`, '#d8d2bf', '#1b2220');
  }

  // ---- city grid: independent of the map grid ----------------------------
