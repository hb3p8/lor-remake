  // Computes city columns/rows from the viewport using the denser city cell
  // metrics, and rebuilds the cell buffer when the dimensions change.
  function updatePanelGridSize() {
    const nextCols = Math.max(1, Math.floor(viewport.clientWidth / PANEL_CELL_W));
    const nextRows = Math.max(1, Math.floor(viewport.clientHeight / PANEL_CELL_H));
    if (nextCols !== panelCols || nextRows !== panelRows) {
      panelCols = nextCols;
      panelRows = nextRows;
      panelCells = [];
      panelCellState = [];
    }
  }

  function ensurePanelCells() {
    updatePanelGridSize();
    const count = panelCols * panelRows;
    panelEl.style.setProperty('--panel-cols', panelCols);
    if (panelCells.length === count) return;
    panelCells = [];
    panelCellState = [];
    panelEl.textContent = '';
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      panelCells.push(s);
      panelCellState.push({ ch: '', fg: '', bg: '' });
      frag.appendChild(s);
    }
    panelEl.appendChild(frag);
  }

  function setPanelCell(i, ch, fg, bg) {
    const s = panelCells[i];
    const state = panelCellState[i];
    if (state.ch !== ch) { s.textContent = ch; state.ch = ch; }
    if (state.fg !== fg) { s.style.color = fg; state.fg = fg; }
    if (state.bg !== bg) { s.style.background = bg; state.bg = bg; }
  }

  // Blit an array of { text, fg, bg } row objects onto the panel grid, padding
  // each row to panelCols. The standard layout for the row-based overlays.
  function blitPanelRows(rows, defaultBg) {
    for (let gy = 0; gy < panelRows; gy++) {
      const row = rows[gy];
      const text = row ? row.text : '';
      const fg = row ? row.fg : '#cfc6a8';
      const bg = row ? row.bg : defaultBg;
      const base = gy * panelCols;
      for (let gx = 0; gx < panelCols; gx++) {
        setPanelCell(base + gx, text[gx] || ' ', fg, bg);
      }
    }
  }

  // ---- top/bottom bars: dense single-row grids over the map's edge rows ----
  // Each bar is one row of barCols cells at panel density. The map underneath
  // is unchanged; the bars just overlay its reserved top and bottom rows.
  function ensureBarRow(el, cellsRef, stateRef) {
    if (cellsRef.cells.length === barCols) return;
    cellsRef.cells = [];
    stateRef.state = [];
    el.textContent = '';
    el.style.setProperty('--bar-cols', barCols);
    const frag = document.createDocumentFragment();
    for (let i = 0; i < barCols; i++) {
      const s = document.createElement('span');
      cellsRef.cells.push(s);
      stateRef.state.push({ ch: '', fg: '', bg: '' });
      frag.appendChild(s);
    }
    el.appendChild(frag);
  }

  function setBarCell(cells, state, i, ch, fg, bg) {
    const s = cells[i];
    const st = state[i];
    if (st.ch !== ch) { s.textContent = ch; st.ch = ch; }
    if (st.fg !== fg) { s.style.color = fg; st.fg = fg; }
    if (st.bg !== bg) { s.style.background = bg; st.bg = bg; }
  }

  function writeBar(el, cellsRef, stateRef, text, fg, bg) {
    ensureBarRow(el, cellsRef, stateRef);
    el.style.setProperty('--bar-cols', barCols);
    for (let i = 0; i < barCols; i++) {
      setBarCell(cellsRef.cells, stateRef.state, i, text[i] || ' ', fg, bg);
    }
  }

  function arrowForVector(dx, dy) {
    if (dy < 0) return dx < 0 ? '↖' : (dx > 0 ? '↗' : '↑');
    if (dy > 0) return dx < 0 ? '↙' : (dx > 0 ? '↘' : '↓');
    return dx < 0 ? '←' : '→';
  }

  function renderFlashOverlay(cells, fg, bg, currentMap) {
    if (!cells || !cells.length) return;
    const mapRows = visibleWorldRows();
    for (let i = 0; i < cells.length; i++) {
      const cell = cells[i];
      const gx = cell.x - cameraX;
      const gy = cell.y - cameraY;
      if (gx < 0 || gy < 0 || gx >= viewCols || gy >= mapRows) continue;
      if (!game.visible[idx(cell.x, cell.y)]) continue; // invisible flashes skipped
      setGridCell(
        (gy + TOP_BAR_ROWS) * viewCols + gx,
        cell.glyph,
        fg,
        bg,
        { x: cell.x, y: cell.y, t: currentMap.tiles[cell.y][cell.x], view: 'world' }
      );
    }
  }
  function renderFightFlashOverlay(currentMap) {
    renderFlashOverlay(fightFlashCells, '#ff3b30', '#3a0909', currentMap);
    renderFlashOverlay(levelFlashCells, '#39d353', '#0c3a18', currentMap);
  }

  // Posted bounties: a gold "$" flag on the target tile so the player sees their
  // standing rewards. Explore flags show even through fog; lair flags once known.
  function renderBountyOverlay(currentMap) {
    if (!game || !game.bounties.length) return;
    const mapRows = visibleWorldRows();
    for (const b of game.bounties) {
      let bx, by;
      if (b.type === 'explore') { bx = b.x; by = b.y; }
      else if (b.type === 'lair') {
        const l = game.lairs.find(x => x.id === b.lairId);
        if (!l || !game.discovered[idx(l.x, l.y)]) continue;
        bx = l.x; by = l.y;
      } else continue; // kill bounties show on the enemy, not as a fixed flag
      const gx = bx - cameraX, gy = by - cameraY;
      if (gx < 0 || gy < 0 || gx >= viewCols || gy >= mapRows) continue;
      setGridCell((gy + TOP_BAR_ROWS) * viewCols + gx, '$', '#ffd34d', '#3a2e0a',
        { x: bx, y: by, t: currentMap.tiles[by][bx], view: 'world' });
    }
  }

  function renderWorld(currentMap) {
    ensureGridCells();
    edgeActorCells.fill(0);
    const mapRows = visibleWorldRows();
    renderBars();

    for (let gy = 0; gy < mapRows; gy++) {
      for (let gx = 0; gx < viewCols; gx++) {
        const screenY = gy + TOP_BAR_ROWS;
        const cellIndex = screenY * viewCols + gx;
        const x = cameraX + gx;
        const y = cameraY + gy;
        const tileIndex = idx(x, y);
        if (!game || !game.discovered[tileIndex]) {
          setGridCell(cellIndex, '?', '#20241f', '#030504', { x, y, t: 'UNKNOWN', view: 'world' });
          continue;
        }
        const tKey = currentMap.tiles[y][x];
        const def = tilePalette(tKey);
        const isHighlighted = highlightedTile && highlightedTile.x === x && highlightedTile.y === y;
        const isVisible = game.visible[tileIndex];
        const actor = isVisible ? actorAt(x, y) : null;
        const hostile = isVisible ? hostileAt(x, y) : null;
        const lair = (!actor && !hostile) ? lairAt(x, y) : null;
        const lairDef = lair ? LAIR_DEFS[lair.type] : null;
        const ch = actor ? actor.glyph : (hostile ? hostile.glyph : (lairDef ? lairDef.glyph : glyphFor(tKey, x, y, currentMap.seed ^ 0xC0FFEE)));
        const fg = actor ? actor.fg : (hostile ? hostile.fg : (lairDef ? lairDef.fg : (isHighlighted ? '#fff6cb' : def.fg)));
        const bg = isHighlighted ? '#6a4a1a' : (isVisible ? def.bg : '#151916');
        setGridCell(
          cellIndex,
          ch,
          fg,
          bg,
          { x, y, t: tKey, view: 'world' }
        );
      }
    }

    if (!game) return;
    renderBountyOverlay(currentMap);
    renderFightFlashOverlay(currentMap);
    for (let i = 0; i < game.actors.length; i++) {
      const actor = game.actors[i];
      if (!actor.alive) continue;
      const dx = actor.x - cameraX;
      const dy = actor.y - cameraY;
      if (dx >= 0 && dx < viewCols && dy >= 0 && dy < mapRows) continue;
      const gx = Math.max(0, Math.min(viewCols - 1, dx));
      const gy = Math.max(0, Math.min(mapRows - 1, dy));
      const edgeWorldX = cameraX + gx;
      const edgeWorldY = cameraY + gy;
      if (actorAt(edgeWorldX, edgeWorldY)) continue;
      const screenY = gy + TOP_BAR_ROWS;
      const cellIndex = screenY * viewCols + gx;
      if (edgeActorCells[cellIndex]) continue;
      edgeActorCells[cellIndex] = i + 1;
      setGridCell(
        cellIndex,
        arrowForVector(dx, dy),
        actor.fg,
        '#2a2414',
        { x: edgeWorldX, y: edgeWorldY, t: currentMap.tiles[edgeWorldY][edgeWorldX], view: 'world' }
      );
    }
  }

  function costLabel(cost) {
    const parts = [];
    if (cost.coin) parts.push(`${cost.coin}c`);
    if (cost.wood) parts.push(`${cost.wood}w`);
    if (cost.stone) parts.push(`${cost.stone}s`);
    return parts.length ? parts.join(' ') : 'free';
  }

  function renderCityView() {
    ensurePanelCells();
    cityHotspots = [];
    const cells = Array.from({ length: panelRows }, () =>
      Array.from({ length: panelCols }, () => ({ ch: ' ', fg: '#cfc6a8', bg: '#11130f' }))
    );
    const write = (x, y, text, fg = '#d8d2bf', bg = '#11130f') => {
      if (y < 0 || y >= panelRows) return;
      for (let i = 0; i < text.length && x + i < panelCols; i++) {
        if (x + i < 0) continue;
        cells[y][x + i] = { ch: text[i], fg, bg };
      }
    };
    const hline = (y) => write(0, y, '-'.repeat(panelCols), '#6e664f', '#11130f');
    const hot = (y, x0, x1, action) => cityHotspots.push({ y, x0, x1, action });

    write(1, 0, '< BACK TO MAP', '#f7d176');
    hot(0, 0, panelCols - 1, { type: 'back' });
    hline(1);

    if (!game) {
      for (let gy = 0; gy < panelRows; gy++)
        for (let gx = 0; gx < panelCols; gx++)
          setPanelCell(gy * panelCols + gx, cells[gy][gx].ch, cells[gy][gx].fg, cells[gy][gx].bg);
      return;
    }

    let y = 2;
    write(1, y++, `ALDERMERE  ${castleTier().name.toUpperCase()}`, '#ffe999');
    write(1, y++, `Pop ${game.population}/${housingCap()}   ${game.season}`, '#d8d2bf');
    // Food line: stored, with production (farms) and consumption (eaten) split.
    const fProd = Math.round(foodProduction() * 10) / 10;
    const fCons = Math.round(foodConsumption() * 10) / 10;
    const fNet = Math.round((fProd - fCons) * 10) / 10;
    write(1, y++, `Food ${Math.floor(game.food)}  +${fProd} farm -${fCons} eat`, fNet >= 0 ? '#cfe0b0' : '#e0a89a');
    // Coin line: stored, with population tax + last turn's hero-spending tax.
    const cTax = Math.round(taxIncome());
    write(1, y++, `Coin ${game.coin}  +${cTax} tax +${game.lastShopIncome || 0} shop`, '#cfe0b0');
    write(1, y++, `Guards ${aliveGuards()}/${guardCount()}${game.raidsLost ? `   Lost to raids: ${game.raidsLost}` : ''}`, '#d8c08a');
    y++;

    // Castle upgrade (food + coin + minimum living heroes).
    const nextFood = castleTier().upgradeFood;
    if (nextFood != null) {
      const nextCoin = castleTier().upgradeCoin;
      const nextHeroes = castleTier().upgradeHeroes;
      const ok = canUpgradeCastle();
      write(1, y, `[ Upgrade to ${CASTLE_TIERS[game.castleTier + 1].name} ]`, ok ? '#cfe0b0' : '#8a7f68');
      hot(y, 0, panelCols - 1, { type: 'upgrade' });
      y++;
      const fCol = game.food >= nextFood ? '#9bbf86' : '#e0a89a';
      const cCol = game.coin >= nextCoin ? '#9bbf86' : '#e0a89a';
      const hCol = aliveHeroCount() >= nextHeroes ? '#9bbf86' : '#e0a89a';
      write(3, y, `${nextFood}f`, fCol);
      write(8, y, `${nextCoin}c`, cCol);
      write(15, y, `heroes ${aliveHeroCount()}/${nextHeroes}`, hCol);
    } else {
      write(1, y, 'Castle at maximum tier', '#8f846b');
    }
    y += 2;

    // Construction.
    hline(y++);
    write(1, y++, 'BUILD  (coin)', '#c9a35a');
    if (game.building) {
      write(1, y++, `...building ${BUILDINGS[game.building.id].name} (${game.building.remaining} left)`, '#cdb98a');
    }
    for (const id of BUILD_ORDER.concat(GUILD_ORDER)) {
      const def = BUILDINGS[id];
      if (hasBuilt(id)) { write(1, y++, `[x] ${def.name}`, '#6e9b5a'); continue; }
      if (def.terrain && !game.castleAdj[def.terrain]) {
        write(1, y++, `[-] ${def.name} (needs ${def.terrain})`, '#5b5343');
        continue;
      }
      const busy = !!game.building;
      const ok = !busy && game.coin >= def.coin;
      const note = def.note ? ` ${def.note}` : '';
      write(1, y, `[ ] ${def.name}  ${def.coin}c${note}`, ok ? '#cfe0b0' : '#8a7f68');
      if (!busy) hot(y, 0, panelCols - 1, { type: 'build', id });
      y++;
    }
    y++;

    // Hiring (built guilds).
    const builtGuilds = GUILD_ORDER.filter(id => hasBuilt(id));
    if (builtGuilds.length) {
      hline(y++);
      write(1, y++, 'HIRE  (coin)', '#c9a35a');
      for (const id of builtGuilds) {
        const guild = BUILDINGS[id].guild;
        const t = HERO_TEMPLATES[guild];
        const have = heroesOfGuild(guild);
        const ok = canHire(guild);
        write(1, y, `[+] ${t.name}  ${t.hireCoin}c (${have}/${MAX_HEROES_PER_GUILD})`, ok ? '#cfe0b0' : '#8a7f68');
        if (ok) hot(y, 0, panelCols - 1, { type: 'hire', guild });
        y++;
      }
      y++;
    }


    for (let gy = 0; gy < panelRows; gy++) {
      for (let gx = 0; gx < panelCols; gx++) {
        const cell = cells[gy][gx];
        setPanelCell(gy * panelCols + gx, cell.ch, cell.fg, cell.bg);
      }
    }
  }

  // Simple greedy word wrap. Breaks on spaces, carries a 2-space continuation
  // indent on wrapped lines, and hard-splits any single token wider than the
  // column. Always returns at least one line.
  function wrapText(text, width) {
    if (width < 1) return [text];
    const lead = (String(text).match(/^\s*/) || [''])[0];
    const cont = lead.length + 2 < width ? lead + '  ' : lead;
    const tokens = String(text).trim().length ? String(text).trim().split(/\s+/) : [''];
    const lines = [];
    let cur = lead;
    let hasWord = false;
    for (let token of tokens) {
      while (token.length > width) {
        if (hasWord) { lines.push(cur); cur = cont; hasWord = false; }
        const room = Math.max(1, width - cur.length);
        lines.push(cur + token.slice(0, room));
        token = token.slice(room);
        cur = cont;
        hasWord = false;
      }
      const sep = hasWord ? 1 : 0;
      if (hasWord && cur.length + sep + token.length > width) {
        lines.push(cur);
        cur = cont + token;
      } else {
        cur = cur + (hasWord ? ' ' : '') + token;
      }
      hasWord = true;
    }
    lines.push(cur);
    return lines;
  }

  function renderReportView() {
    ensurePanelCells();
    const rows = Array.from({ length: panelRows }, () => ({ text: '', fg: '#cfc6a8', bg: '#11130f' }));
    rows[0] = { text: '< BACK TO MAP', fg: '#f7d176', bg: '#11130f' };
    rows[1] = { text: '-'.repeat(panelCols), fg: '#6e664f', bg: '#11130f' };
    rows[2] = { text: 'TURN REPORT', fg: '#c9a35a', bg: '#11130f' };

    const threats = game ? game.hostiles.filter(hostile => hostile.alive).length : 0;
    rows[4] = { text: game ? `POP ${game.population}/${housingCap()}  COIN ${game.coin}  FOOD ${Math.floor(game.food)}  THREATS ${threats}` : '', fg: '#d8d2bf', bg: '#11130f' };
    if (game) {
      let y = 6;
      const put = (text, fg) => {
        for (const line of wrapText(text, panelCols)) {
          if (y >= panelRows - 1) break;
          rows[y++] = { text: line, fg, bg: '#11130f' };
        }
      };
      const builtNames = game.built.map(id => BUILDINGS[id].name).join(', ') || 'none';
      put(`${castleTier().name} — buildings: ${builtNames}`, '#c9a35a');
      y += 1;
      for (const actor of game.actors) {
        if (y >= panelRows - 2) break;
        const state = actor.alive ? `${actor.x},${actor.y} HP${actor.hp}/${actor.maxHp}` : 'DEAD';
        const goal = actor.goal ? `${actor.goal.type} ${actor.goal.target.x},${actor.goal.target.y}` : 'idle';
        rows[y++] = { text: `${actor.glyph} ${actor.name} ${state} ${goal}`, fg: actor.alive ? actor.fg : '#7a4a4a', bg: '#11130f' };
      }

      // Recent summary events.
      if (y < panelRows - 2) {
        y += 1;
        rows[y++] = { text: 'EVENTS', fg: '#c9a35a', bg: '#11130f' };
        for (const line of game.reports.slice(0, 4)) {
          if (y >= panelRows - 1) break;
          put(line, '#d8d2bf');
        }
      }

      // Detailed battle log (newest first), word-wrapped to the column.
      if (game.battleLog.length && y < panelRows - 2) {
        y += 1;
        rows[y++] = { text: 'BATTLE LOG', fg: '#c9a35a', bg: '#11130f' };
        for (const entry of game.battleLog) {
          if (y >= panelRows - 1) break;
          // Engagement headers (T05 ...) brighter than the indented swing lines.
          put(entry, /^\s/.test(entry) ? '#9b8f72' : '#cdb98a');
        }
      }
    }

    blitPanelRows(rows, '#11130f');
  }

  function renderActorView() {
    ensurePanelCells();
    const actor = selectedActor;
    const rows = Array.from({ length: panelRows }, () => ({ text: '', fg: '#cfc6a8', bg: '#11130f' }));
    rows[0] = { text: '< BACK TO MAP', fg: '#f7d176', bg: '#11130f' };

    rows[2] = { text: 'CHARACTER DETAILS', fg: '#c9a35a', bg: '#11130f' };

    } else {
      const goal = actor.goal;
      const goalText = goal ? `${goal.type.toUpperCase()} ${goal.target.x},${goal.target.y}` : 'IDLE';

      }

      rows[21] = { text: `Path left ${pathSteps}`, fg: '#9b8f72', bg: '#11130f' };

  // Shared bounty controls for the enemy/lair/tile views. Writes a header + the
  // current reward + clickable [+step] / [cancel] rows, registering panelHotspots.
  function addBountyControls(rows, y, header, reward) {
    rows[y++] = { text: header, fg: '#c9a35a', bg: '#11130f' };
    rows[y++] = { text: reward > 0 ? `Reward posted: ${reward} coin` : 'No reward posted', fg: reward > 0 ? '#e8d59a' : '#9b8f72', bg: '#11130f' };
    const canAdd = game && game.coin >= BOUNTY_STEP && reward < BOUNTY_MAX;
    rows[y] = { text: `[ + ${BOUNTY_STEP} coin reward ]`, fg: canAdd ? '#cfe0b0' : '#8a7f68', bg: '#11130f' };
    panelHotspots.push({ y, x0: 0, x1: panelCols - 1, action: { type: 'bountyAdd' } });
    y++;
    if (reward > 0) {
      rows[y] = { text: `[ cancel — refund ${reward} ]`, fg: '#e0a89a', bg: '#11130f' };
      panelHotspots.push({ y, x0: 0, x1: panelCols - 1, action: { type: 'bountyCancel' } });
      y++;
    }
    return y;
  }

  function renderTileBountyView() {
    ensurePanelCells();
    panelHotspots = [{ y: 0, x0: 0, x1: panelCols - 1, action: { type: 'back' } }, { y: 1, x0: 0, x1: panelCols - 1, action: { type: 'back' } }];
    const rows = Array.from({ length: panelRows }, () => ({ text: '', fg: '#cfc6a8', bg: '#11130f' }));
    rows[0] = { text: '< BACK TO MAP', fg: '#f7d176', bg: '#11130f' };
    rows[1] = { text: '-'.repeat(panelCols), fg: '#6e664f', bg: '#11130f' };
    rows[2] = { text: 'UNCHARTED LANDS', fg: '#c9a35a', bg: '#11130f' };
    if (bountyTile) {
      rows[4] = { text: `Tile ${bountyTile.x},${bountyTile.y} — unknown`, fg: '#d8d2bf', bg: '#11130f' };
      rows[5] = { text: 'Post a reward and a scout', fg: '#9b8f72', bg: '#11130f' };
      rows[6] = { text: 'will be drawn to reveal it.', fg: '#9b8f72', bg: '#11130f' };
      const b = exploreBountyAt(bountyTile.x, bountyTile.y);
      addBountyControls(rows, 8, 'SCOUTING BOUNTY', b ? b.reward : 0);
    }
    blitPanelRows(rows, '#11130f');
  }

  function renderLairView() {
    ensurePanelCells();
    panelHotspots = [{ y: 0, x0: 0, x1: panelCols - 1, action: { type: 'back' } }, { y: 1, x0: 0, x1: panelCols - 1, action: { type: 'back' } }];
    const rows = Array.from({ length: panelRows }, () => ({ text: '', fg: '#cfc6a8', bg: '#11130f' }));
    rows[0] = { text: '< BACK TO MAP', fg: '#f7d176', bg: '#11130f' };
    rows[1] = { text: '-'.repeat(panelCols), fg: '#6e664f', bg: '#11130f' };
    rows[2] = { text: 'MONSTER LAIR', fg: '#c9a35a', bg: '#11130f' };
    const l = selectedLair;
    if (l) {
      const def = LAIR_DEFS[l.type];
      rows[4] = { text: `${def.glyph} ${def.label.toUpperCase()}`, fg: def.fg, bg: '#11130f' };
      rows[5] = { text: l.destroyed ? 'DESTROYED' : (l.active ? `HP ${l.hp}/${l.maxHp}` : 'DORMANT'), fg: '#d8d2bf', bg: '#11130f' };
      rows[6] = { text: `${l.x},${l.y}`, fg: '#9b8f72', bg: '#11130f' };
      rows[8] = { text: 'Post a reward to send your', fg: '#9b8f72', bg: '#11130f' };
      rows[9] = { text: 'champions to destroy it.', fg: '#9b8f72', bg: '#11130f' };
      const b = lairBountyOn(l);
      addBountyControls(rows, 11, 'DESTROY BOUNTY', b ? b.reward : 0);
    }
    blitPanelRows(rows, '#11130f');
  }

  function renderHostileView() {
    ensurePanelCells();
    panelHotspots = [{ y: 0, x0: 0, x1: panelCols - 1, action: { type: 'back' } }, { y: 1, x0: 0, x1: panelCols - 1, action: { type: 'back' } }];
    const hostile = selectedHostile;
    const rows = Array.from({ length: panelRows }, () => ({ text: '', fg: '#cfc6a8', bg: '#11130f' }));
    rows[0] = { text: '< BACK TO MAP', fg: '#f7d176', bg: '#11130f' };
    rows[1] = { text: '-'.repeat(panelCols), fg: '#6e664f', bg: '#11130f' };
    rows[2] = { text: 'ENEMY DETAILS', fg: '#c9a35a', bg: '#11130f' };

    if (!hostile) {
      rows[4] = { text: 'NO ENEMY SELECTED', fg: '#9b8f72', bg: '#11130f' };
    } else {
      const template = hostileTemplate(hostile.kind);
      const goal = hostile.goal;
      const goalText = goal ? `${goal.type.toUpperCase()} ${goal.target.x},${goal.target.y}` : 'IDLE';
      const goalReason = goal && goal.reason
        ? (goal.type === 'stalk' ? `Stalking ${goal.reason}` : `Drawn to ${goal.reason}`)
        : 'Roaming its territory';
      const aliveText = hostile.alive ? 'PROWLING' : 'SLAIN';
      const habitat = template.prefers.map(k => (T[k] ? T[k].name : k)).join(', ');
      rows[4] = { text: `${hostile.glyph} ${hostile.name.toUpperCase()}  ${aliveText}`, fg: hostile.alive ? hostile.fg : '#7a4a4a', bg: '#11130f' };
      rows[5] = { text: `THREAT ${hostile.threat.toFixed(1)}`, fg: '#8f846b', bg: '#11130f' };
      rows[7] = { text: `HP       ${hostile.hp}/${hostile.maxHp}`, fg: '#d8d2bf', bg: '#11130f' };
      rows[8] = { text: `MOVE     ${hostile.steps.toFixed(1)} budget`, fg: '#d8d2bf', bg: '#11130f' };
      rows[9] = { text: `RANGE    ${hostile.territory} tiles`, fg: '#d8d2bf', bg: '#11130f' };
      rows[11] = { text: 'POSITION', fg: '#c9a35a', bg: '#11130f' };
      rows[12] = { text: `${hostile.x},${hostile.y} ${T[map.tiles[hostile.y][hostile.x]].name.toUpperCase()}`, fg: '#d8d2bf', bg: '#11130f' };
      rows[13] = { text: `LAIR ${hostile.originX},${hostile.originY}`, fg: '#9b8f72', bg: '#11130f' };
      rows[15] = { text: 'HABITAT', fg: '#c9a35a', bg: '#11130f' };
      rows[16] = { text: habitat, fg: '#d8d2bf', bg: '#11130f' };
      rows[18] = { text: 'BEHAVIOR', fg: '#c9a35a', bg: '#11130f' };
      rows[19] = { text: goalText, fg: '#d8d2bf', bg: '#11130f' };
      rows[20] = { text: goalReason, fg: '#9b8f72', bg: '#11130f' };
      if (hostile.alive) {
        const kb = killBountyOn(hostile);
        addBountyControls(rows, 22, 'KILL BOUNTY', kb ? kb.reward : 0);
      }
    }

    blitPanelRows(rows, '#11130f');
  }

  function renderGameOver() {
    ensurePanelCells();
    const rows = Array.from({ length: panelRows }, () => ({ text: '', fg: '#d8c0b0', bg: '#1a0d0c' }));
    const center = (s) => ' '.repeat(Math.max(0, Math.floor((panelCols - s.length) / 2))) + s;
    const mid = Math.floor(panelRows / 2);
    rows[mid - 4] = { text: center('THE HOLDING HAS FALLEN'), fg: '#e0726a', bg: '#1a0d0c' };
    rows[mid - 2] = { text: center('Aldermere is overrun;'), fg: '#b9a795', bg: '#1a0d0c' };
    rows[mid - 1] = { text: center('its folk are scattered.'), fg: '#b9a795', bg: '#1a0d0c' };
    if (game) rows[mid + 1] = { text: center(`${game.turn} turns · ${castleTier().name}`), fg: '#9b8f7e', bg: '#1a0d0c' };
    rows[mid + 4] = { text: center('[ BEGIN ANEW ]'), fg: '#f3d28a', bg: '#1a0d0c' };
    blitPanelRows(rows, '#1a0d0c');
  }

  // Full-screen text overlays render on the dense panel grid; only the world
  // view uses the sparse map grid. Show exactly one grid at a time.
  const PANEL_VIEWS = new Set(['city', 'report', 'actor', 'enemy', 'gameover', 'tilebounty', 'lair']);

  function render(currentMap = map) {
    const panelActive = PANEL_VIEWS.has(viewMode);
    panelEl.classList.toggle('active', panelActive);
    mapEl.classList.toggle('hidden', panelActive);
    // Bars belong to the world view only; hide them under full-screen panels.
    topbarEl.classList.toggle('active', !panelActive);
    botbarEl.classList.toggle('active', !panelActive);
    if (viewMode === 'city') renderCityView();
    else if (viewMode === 'report') renderReportView();
    else if (viewMode === 'actor') renderActorView();
    else if (viewMode === 'enemy') renderHostileView();
    else if (viewMode === 'tilebounty') renderTileBountyView();
    else if (viewMode === 'lair') renderLairView();
    else if (viewMode === 'gameover') renderGameOver();
    else renderWorld(currentMap);
  }

  function renderLegend() {
    const ul = document.getElementById('legend');
    ul.innerHTML = '';
    const order = ['UNKNOWN','DEEP','WATER','RIVER','BRIDGE','SHORE','PLAINS','GRASS','FARM','FOREST','DEEPWOOD','SWAMP','HILL','MOUNTAIN','PEAK','ROAD','TOWN','CASTLE','RUIN'];
    for (const k of order) {
      const def = T[k];
      const li = document.createElement('li');
      const sw = document.createElement('span');
      sw.className = 'sw';
      sw.textContent = def.g[0];
      sw.style.color = def.fg;
      sw.style.background = def.bg;
      li.appendChild(sw);
      const label = document.createElement('span');
      label.textContent = def.name;
      li.appendChild(label);
      const cost = document.createElement('span');
      cost.className = 'cost';
      if (!isFinite(def.cost)) {
        cost.classList.add('imp');
        cost.textContent = '∞';
      } else {
        cost.textContent = def.cost.toFixed(1);
      }
      li.appendChild(cost);
      ul.appendChild(li);
    }
    document.getElementById('slopeK').textContent = String(SLOPE_K);
  }

  // ---- camera / click -----------------------------------------------------
  // The viewport below is intentionally constrained to a phone-like window.
  // The player-facing app is only this grid; any readouts or controls outside
  // it are debug surfaces and should eventually move in-grid or disappear.
  const viewport = document.getElementById('viewport');
  const mapEl = document.getElementById('map');
  const panelEl = document.getElementById('panelgrid');
  const topbarEl = document.getElementById('topbar');
  const botbarEl = document.getElementById('botbar');
  let gridCells = [];
  let gridCellState = [];
  // City view's independent grid (own DOM, own cell buffer, own dimensions).
  let panelCells = [];
  let panelCellState = [];
  let panelCols = 1, panelRows = 1;
  // Dense top/bottom bars (one row each, panel-density columns).
  let barCols = 1;
  const topbarCellsRef = { cells: [] };
  const topbarStateRef = { state: [] };
  const botbarCellsRef = { cells: [] };
  const botbarStateRef = { state: [] };
  let edgeActorCells = new Int16Array(0);
  let fightFlashCells = null;
  let levelFlashCells = null;
  const TOP_BAR_ROWS = 1;
  const BOTTOM_BAR_ROWS = 1;
  let viewCols = 1, viewRows = 1;
  let cameraX = 0, cameraY = 0;
  let viewMode = 'world';
  let cityTile = null;
  let cityHotspots = [];
  let panelHotspots = [];     // clickable rows for enemy/lair/tilebounty views
  let bountyTile = null;      // the fog tile being viewed for an explore bounty
  let selectedLair = null;    // the lair being viewed
  let selectedActor = null;
  let selectedHostile = null;
  let highlightedTile = null;
  const CLICK_SLOP = 6;
  let isAnimatingTurn = false;

  function visibleWorldRows() {
    return Math.max(1, viewRows - TOP_BAR_ROWS - BOTTOM_BAR_ROWS);
  }

  function worldCellFromScreen(gx, gy, camX = cameraX, camY = cameraY) {
    if (gx < 0 || gx >= viewCols) return null;
    if (gy < TOP_BAR_ROWS || gy >= viewRows - BOTTOM_BAR_ROWS) return null;
    const x = camX + gx;
    const y = camY + (gy - TOP_BAR_ROWS);
    if (x < 0 || y < 0 || x >= COLS || y >= ROWS) return null;
    return { x, y };
  }

  function describeTile(tile) {
    if (!tile) return game ? game.log : 'DRAG TO PAN · TAP UNIT OR CASTLE';
    const actor = actorAt(tile.x, tile.y);
    const hostile = game && game.visible[idx(tile.x, tile.y)] ? hostileAt(tile.x, tile.y) : null;
    const actorText = actor ? ` ${actor.name.toUpperCase()} HP${actor.hp} ${actor.cargoFood ? ` FOOD${actor.cargoFood}` : ''} ${actor.goal ? actor.goal.type.toUpperCase() : 'IDLE'}` : '';
    const hostileText = hostile ? ` ${hostile.name.toUpperCase()} HP${hostile.hp}` : '';
    const lair = (!actor && !hostile) ? lairAt(tile.x, tile.y) : null;
    const lairText = lair ? ` ${LAIR_DEFS[lair.type].label.toUpperCase()} ${lair.active ? `HP${lair.hp}/${lair.maxHp}` : 'DORMANT'}` : '';
    return `${tile.x},${tile.y} ${T[tile.tKey].name.toUpperCase()}${actorText}${hostileText}${lairText}`;
  }

  function clampCamera() {
    cameraX = Math.max(0, Math.min(COLS - viewCols, cameraX));
    cameraY = Math.max(0, Math.min(ROWS - visibleWorldRows(), cameraY));
  }

  function updateViewGridSize() {
    const nextCols = Math.max(1, Math.min(COLS, Math.floor(viewport.clientWidth / CELL_W)));
    const nextRows = Math.max(TOP_BAR_ROWS + BOTTOM_BAR_ROWS + 1, Math.min(ROWS, Math.floor(viewport.clientHeight / CELL_H)));
    if (nextCols !== viewCols || nextRows !== viewRows) {
      gridCells = [];
      gridCellState = [];
    }
    viewCols = nextCols;
    viewRows = nextRows;
    // Dense bars span the full map width at panel density; align the bottom bar
    // to the map's last reserved row so it sits over the same pixels.
    const nextBarCols = Math.max(1, Math.floor((viewCols * CELL_W) / PANEL_CELL_W));
    if (nextBarCols !== barCols) {
      barCols = nextBarCols;
      topbarCellsRef.cells = [];
      topbarStateRef.state = [];
      botbarCellsRef.cells = [];
      botbarStateRef.state = [];
    }
    botbarEl.style.top = ((viewRows - 1) * CELL_H) + 'px';
    clampCamera();
  }

  function centerCameraOnCastle() {
    let targetX = Math.floor(COLS / 2);
    let targetY = Math.floor(ROWS / 2);
    if (map) {
      for (let y = 0; y < ROWS; y++) {
        const x = map.tiles[y].indexOf('CASTLE');
        if (x !== -1) {
          targetX = x;
          targetY = y;
          break;
        }
      }
    }
    cameraX = targetX - Math.floor(viewCols / 2);
    cameraY = targetY - Math.floor(visibleWorldRows() / 2);
    clampCamera();
    return { x: targetX, y: targetY };
  }

  let dragging = false;
  let dragStartX = 0, dragStartY = 0, cameraStartX = 0, cameraStartY = 0;
  let dragMoved = false;
  let dragPointerId = null;
  let renderQueued = false;

  function isMobileMode() {
    return document.body.classList.contains('mobile-device');
  }

  function requestRender() {
    if (renderQueued) return;
    renderQueued = true;
    requestAnimationFrame(() => {
      renderQueued = false;
      if (map) render(map);
    });
  }

  function screenCellFromPoint(clientX, clientY) {
    const rect = viewport.getBoundingClientRect();
    return {
      gx: Math.floor((clientX - rect.left) / CELL_W),
      gy: Math.floor((clientY - rect.top) / CELL_H),
    };
  }

  // Hit-test in panel-grid coordinates (used by every full-screen overlay).
  function panelCellFromPoint(clientX, clientY) {
    const rect = viewport.getBoundingClientRect();
    return {
      gx: Math.floor((clientX - rect.left) / PANEL_CELL_W),
      gy: Math.floor((clientY - rect.top) / PANEL_CELL_H),
    };
  }

  function handleGridClick(clientX, clientY) {
    const { gx, gy } = screenCellFromPoint(clientX, clientY);
    if (gx < 0 || gy < 0 || gx >= viewCols || gy >= viewRows) return;

    if (isAnimatingTurn) return;

    // Game over: any tap starts a fresh holding.
    if (viewMode === 'gameover') {
      reroll();
      return;
    }

    // Top-bar tap takes the next big turn (economy + sub-turns).
    if (viewMode === 'world' && gy === 0) {
      advanceTurn();
      return;
    }

    // Full-screen overlays hit-test on the dense panel grid, not the map grid.
    if (PANEL_VIEWS.has(viewMode)) {
      const { gx: pgx, gy: pgy } = panelCellFromPoint(clientX, clientY);

      if (viewMode === 'city') {
        const spot = cityHotspots.find(h => h.y === pgy && pgx >= h.x0 && pgx <= h.x1);
        if (!spot) return;
        const a = spot.action;
        if (a.type === 'back') {
          viewMode = 'world';
          render(map);
          updateCursorFromPoint(clientX, clientY);
          return;
        }
        // Player management actions apply immediately and re-render the screen.
        if (a.type === 'upgrade') upgradeCastle();
        else if (a.type === 'build') startBuild(a.id);
        else if (a.type === 'hire') hireHero(a.guild);
        renderCityView();
        return;
      }

      // enemy / lair / tilebounty: clickable bounty controls (+ a BACK row).
      if (viewMode === 'enemy' || viewMode === 'lair' || viewMode === 'tilebounty') {
        const spot = panelHotspots.find(h => h.y === pgy && pgx >= h.x0 && pgx <= h.x1);
        if (!spot) return;
        const a = spot.action;
        if (a.type === 'back') {
          viewMode = 'world';
          selectedHostile = null;
          selectedLair = null;
          bountyTile = null;
          render(map);
          updateCursorFromPoint(clientX, clientY);
          return;
        }
        if (a.type === 'bountyAdd') {
          if (viewMode === 'tilebounty' && bountyTile) raiseBounty('explore', { x: bountyTile.x, y: bountyTile.y });
          else if (viewMode === 'enemy' && selectedHostile) raiseBounty('kill', selectedHostile.id);
          else if (viewMode === 'lair' && selectedLair) raiseBounty('lair', selectedLair.id);
        } else if (a.type === 'bountyCancel') {
          let b = null;
          if (viewMode === 'tilebounty' && bountyTile) b = exploreBountyAt(bountyTile.x, bountyTile.y);
          else if (viewMode === 'enemy' && selectedHostile) b = killBountyOn(selectedHostile);
          else if (viewMode === 'lair' && selectedLair) b = lairBountyOn(selectedLair);
          cancelBounty(b);
        }
        render(map);
        return;
      }
      // report / actor: the top two rows are the BACK affordance.
      if (pgy <= 1) {
        viewMode = 'world';
        selectedActor = null;
        selectedHostile = null;
        render(map);
        updateCursorFromPoint(clientX, clientY);
      }
      return;
    }

    // Bottom status bar opens the turn report / battle log on demand.
    if (gy === viewRows - 1) {
      viewMode = 'report';
      render(map);
      return;
    }

    const indicatorActorIndex = edgeActorCells[gy * viewCols + gx] - 1;
    if (indicatorActorIndex >= 0 && game) {
      const actor = game.actors[indicatorActorIndex];
      if (actor && actor.alive) {
        selectedActor = actor;
        highlightedTile = { x: actor.x, y: actor.y, tKey: map.tiles[actor.y][actor.x] };
        viewMode = 'actor';
        render(map);
        updateCursorFromPoint(clientX, clientY);
        return;
      }
    }

    const tile = worldCellFromScreen(gx, gy);
    if (!map || !tile) return;
    const tKey = map.tiles[tile.y][tile.x];
    const tileIndex = idx(tile.x, tile.y);
    // The castle always opens the city view, even when a guard is standing on it.
    if (tKey === 'CASTLE') {
      cityTile = { x: tile.x, y: tile.y, tKey };
      selectedActor = null;
      viewMode = 'city';
      render(map);
      updateCursorFromPoint(clientX, clientY);
      return;
    }
    const actor = game && game.visible[tileIndex] ? actorAt(tile.x, tile.y) : null;
    if (actor) {
      selectedActor = actor;
      highlightedTile = { x: tile.x, y: tile.y, tKey };
      viewMode = 'actor';
      render(map);
      updateCursorFromPoint(clientX, clientY);
      return;
    }
    const hostile = game && game.visible[tileIndex] ? hostileAt(tile.x, tile.y) : null;
    if (hostile) {
      selectedHostile = hostile;
      highlightedTile = { x: tile.x, y: tile.y, tKey };
      viewMode = 'enemy';
      render(map);
      updateCursorFromPoint(clientX, clientY);
      return;
    }
    // A known lair opens its destroy-bounty view.
    const lair = game && game.discovered[tileIndex] ? lairAt(tile.x, tile.y) : null;
    if (lair) {
      selectedLair = lair;
      highlightedTile = { x: tile.x, y: tile.y, tKey };
      viewMode = 'lair';
      render(map);
      updateCursorFromPoint(clientX, clientY);
      return;
    }
    // An unknown (fog) tile opens the scouting-bounty view.
    if (game && !game.discovered[tileIndex]) {
      bountyTile = { x: tile.x, y: tile.y };
      highlightedTile = { x: tile.x, y: tile.y, tKey: 'UNKNOWN' };
      viewMode = 'tilebounty';
      render(map);
      updateCursorFromPoint(clientX, clientY);
      return;
    }
    highlightedTile = { x: tile.x, y: tile.y, tKey: game && game.discovered[tileIndex] ? tKey : 'UNKNOWN' };
    render(map);
    updateCursorFromPoint(clientX, clientY);
  }

  viewport.addEventListener('pointerdown', (e) => {
    if (e.button !== 0) return;
    // Panning is allowed mid-animation so the player can follow the action;
    // a tap (no drag) is still inert during a turn — handleGridClick bails on
    // isAnimatingTurn, so this never triggers a turn or selection.
    e.preventDefault();
    dragging = true;
    dragPointerId = e.pointerId;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    cameraStartX = cameraX;
    cameraStartY = cameraY;
    dragMoved = false;
    viewport.classList.add('dragging');
    if (viewMode === 'world') document.body.classList.add('panning');
    // Clear any existing selection so a drag never feels like text selection.
    const sel = window.getSelection && window.getSelection();
    if (sel) sel.removeAllRanges();
    try { viewport.setPointerCapture(e.pointerId); } catch (_) {}
  });

  viewport.addEventListener('pointermove', (e) => {
    if (!dragging) {
      if (!isMobileMode()) updateCursorFromPoint(e.clientX, e.clientY);
      return;
    }
    if (!dragging || e.pointerId !== dragPointerId) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    if (Math.hypot(dx, dy) > CLICK_SLOP) dragMoved = true;
    if (viewMode !== 'world') return;
    const prevCameraX = cameraX;
    const prevCameraY = cameraY;
    cameraX = cameraStartX - Math.round(dx / CELL_W);
    cameraY = cameraStartY - Math.round(dy / CELL_H);
    clampCamera();
    if (cameraX !== prevCameraX || cameraY !== prevCameraY) requestRender();
    if (!isMobileMode()) updateCursorFromPoint(e.clientX, e.clientY);
  });

  function endDrag(e, allowClick) {
    if (!dragging || (e && e.pointerId !== dragPointerId)) return;
    if (allowClick && !dragMoved) handleGridClick(e.clientX, e.clientY);
    dragging = false;
    dragPointerId = null;
    dragMoved = false;
    viewport.classList.remove('dragging');
    document.body.classList.remove('panning');
  }
  viewport.addEventListener('pointerup', (e) => endDrag(e, true));
  viewport.addEventListener('pointercancel', (e) => endDrag(e, false));
  viewport.addEventListener('lostpointercapture', (e) => endDrag(e, false));

  const cursor = document.getElementById('cursor');
  function updateCursorFromPoint(clientX, clientY) {
    if (!cursor) return;
    const { gx, gy } = screenCellFromPoint(clientX, clientY);
    if (PANEL_VIEWS.has(viewMode)) {
      const { gx: pgx, gy: pgy } = panelCellFromPoint(clientX, clientY);
      if (pgx < 0 || pgy < 0 || pgx >= panelCols || pgy >= panelRows) {
        cursor.textContent = 'cursor: —';
        return;
      }
      cursor.innerHTML = `cursor: ${viewMode} screen (<b>${pgx}</b>, <b>${pgy}</b>)`;
      return;
    }
    const tile = worldCellFromScreen(gx, gy);
    if (!map || gx < 0 || gy < 0 || gx >= viewCols || gy >= viewRows || !tile) {
      cursor.textContent = 'cursor: —';
      return;
    }
    const indicatorActorIndex = edgeActorCells[gy * viewCols + gx] - 1;
    if (indicatorActorIndex >= 0 && game) {
      const actor = game.actors[indicatorActorIndex];
      if (actor && actor.alive) {
        const tKey = map.tiles[actor.y][actor.x];
        const nextHighlight = { x: actor.x, y: actor.y, tKey };
        const changed = !highlightedTile || highlightedTile.x !== nextHighlight.x || highlightedTile.y !== nextHighlight.y || highlightedTile.tKey !== nextHighlight.tKey;
        highlightedTile = nextHighlight;
        if (changed) render(map);
        cursor.innerHTML = `cursor: actor <b>${actor.name}</b> at (<b>${actor.x}</b>, <b>${actor.y}</b>) — <b>${T[tKey].name}</b>`;
        return;
      }
    }
    const isKnown = game && game.discovered[idx(tile.x, tile.y)];
    const tKey = isKnown ? map.tiles[tile.y][tile.x] : 'UNKNOWN';
    const nextHighlight = { x: tile.x, y: tile.y, tKey };
    const changed = !highlightedTile || highlightedTile.x !== nextHighlight.x || highlightedTile.y !== nextHighlight.y || highlightedTile.tKey !== nextHighlight.tKey;
    highlightedTile = nextHighlight;
    if (changed) render(map);
    cursor.innerHTML = `cursor: (<b>${tile.x}</b>, <b>${tile.y}</b>) · screen (<b>${gx}</b>, <b>${gy}</b>) — <b>${T[tKey].name}</b>`;
  }
  viewport.addEventListener('pointerleave', () => {
    if (!dragging) cursor.textContent = 'cursor: —';
  });

  window.addEventListener('resize', () => {
    applyDeviceMode();
    updateViewGridSize();
    if (map) render(map);
  });

  let map = null;
  let game = null;
  let lastTurnEvents = [];

  function startGame(seed, options = null) {
    map = generate(seed);
    game = makeGameState(map);
    for (let i = 0; i < guardCount(); i++) spawnGuard();  // initial garrison
    viewMode = 'world';
    cityTile = null;
    selectedActor = null;
    selectedHostile = null;
    selectedLair = null;
    bountyTile = null;
    fightFlashCells = null;
    levelFlashCells = null;
    lastTurnEvents = [];
    document.getElementById('seed').textContent = seed.toString(16);
    updateViewGridSize();
    const castle = centerCameraOnCastle();
    updateVisibility();
    highlightedTile = { x: castle.x, y: castle.y, tKey: map.tiles[castle.y][castle.x] };
    if (!options || options.render !== false) render(map);
  }

  function reroll() {
    startGame(Math.floor(Math.random() * 0x7fffffff), { render: true });
  }

  function actorSnapshot(actor) {
    return {
      id: actor.id,
      name: actor.name,
      x: actor.x,
      y: actor.y,
      hp: actor.hp,
      maxHp: actor.maxHp,
      supply: actor.supply,
      maxSupply: actor.maxSupply,
      cargoFood: actor.cargoFood,
      cargoWood: actor.cargoWood,
      role: actor.role,
      hero: !!actor.hero,
      searchR: actor.searchR,
      alive: actor.alive,
      xp: actor.xp,
      level: actor.level,
      str: actor.str,
      dex: actor.dex,
      con: actor.con,
      purse: actor.purse || 0,
      equip: actor.equip || 0,
      potions: actor.potions || 0,
      goal: actor.goal ? actor.goal.type : 'idle',
      goalReason: actor.goal ? actor.goal.reason : null,
      gx: actor.goal && actor.goal.target ? actor.goal.target.x : null,
      gy: actor.goal && actor.goal.target ? actor.goal.target.y : null,
    };
  }

  function hostileSnapshot(hostile) {
    return {
      id: hostile.id,
      kind: hostile.kind,
      name: hostile.name,
      x: hostile.x,
      y: hostile.y,
      hp: hostile.hp,
      maxHp: hostile.maxHp,
      alive: hostile.alive,
      goal: hostile.goal ? hostile.goal.type : 'idle',
    };
  }

  function simulationSnapshot() {
    if (!game) return null;
    const discovered = discoveredCount();
    return {
      seed: map.seed,
      turn: game.turn,
      discovered,
      discoveredPct: discovered / (COLS * ROWS),
      ruinsDiscovered: game.discoveredRuins.size,
      ruinsExplored: game.exploredRuins.size,
      coin: game.coin,
      food: Math.floor(game.food),
      foodNet: Math.round((foodProduction() - foodConsumption()) * 10) / 10,
      actors: game.actors.map(actorSnapshot),
      hostiles: game.hostiles.map(hostileSnapshot),
      hostilesAlive: game.hostiles.filter(hostile => hostile.alive).length,
      population: game.population,
      housing: housingCap(),
      castleTier: game.castleTier,
      castleName: castleTier().name,
      guards: aliveGuards(),
      guardTarget: guardCount(),
      raidsLost: game.raidsLost,
      waveNum: game.waveNum,
      lairsCleared: game.lairsCleared || 0,
      lairsActive: game.lairs ? game.lairs.filter(l => l.active && !l.destroyed).length : 0,
      lairsTotal: game.lairs ? game.lairs.length : 0,
      // ---- hero gold loop (Phase 9) ----
      wildGold: game.wildGold || 0,
      shopIncome: game.shopIncome || 0,
      heroGold: game.actors.reduce((s, a) => s + (a.alive && a.hero ? (a.purse || 0) : 0), 0),
      avgEquipTier: (() => {
        const hs = game.actors.filter(a => a.alive && a.hero);
        return hs.length ? hs.reduce((s, a) => s + (a.equip || 0), 0) / hs.length : 0;
      })(),
      heroes: { ranger: heroesOfGuild('ranger'), rogue: heroesOfGuild('rogue'), fighter: heroesOfGuild('fighter'), monster: heroesOfGuild('monster') },
      policy: game.policy,
      built: game.built.slice(0),
      building: game.building ? game.building.id : null,
      season: game.season,
      simStats: { ...game.simStats },
      lastEvents: lastTurnEvents.slice(0),
      battleLog: game.battleLog.slice(0, 16),
    };
  }

  function resetSimulationStats() {
    if (!game) return null;
    game.simStats = makeSimStats();
    return simulationSnapshot();
  }

  // One big turn headless: economy tick, then SUBTURNS sub-turns resolved
  // synchronously, merging the digest.
  function stepSimulationTurn() {
    if (!game) return null;
    viewMode = 'world';
    isAnimatingTurn = false;
    const events = [];
    let combats = 0;
    bigTurnEconomy(events);
    for (let i = 0; i < SUBTURNS; i++) {
      const plan = computeTurnPlan({ recordMoves: false, events });
      if (plan) combats += plan.combats.length;
    }
    endBigTurn(events);
    lastTurnEvents = events.slice(0);
    return {
      events: lastTurnEvents.slice(0),
      combats,
      snapshot: simulationSnapshot(),
    };
  }

  window.__lorTest = {
    newGame(seed, options = null) {
      startGame((seed >>> 0) || 1, { render: !!(options && options.render) });
      // The Steward is off by default in the live game; the harness needs it
      // to operate the city, so enable it here.
      if (game) {
        game.autoSteward = true;
        if (options && options.policy && POLICIES[options.policy]) game.policy = options.policy;
      }
      return simulationSnapshot();
    },
    stepTurn: stepSimulationTurn,
    runTurns(count) {
      let result = null;
      for (let i = 0; i < count; i++) result = stepSimulationTurn();
      return result ? result.snapshot : simulationSnapshot();
    },
    resetStats: resetSimulationStats,
    snapshot: simulationSnapshot,
    _map: () => map,
    // Debug: post/raise a bounty programmatically (UI-less testing).
    postBounty(type, key, raises = 1) {
      if (!game) return null;
      let b = null;
      for (let i = 0; i < raises; i++) b = raiseBounty(type, key);
      return { bounties: game.bounties.length, reward: b ? b.reward : 0, coin: game.coin };
    },
    _bounties: () => game ? game.bounties.slice(0) : [],
    // Debug: open the detail screen for the first living hero of a role.
    selectHero(role) {
      if (!game) return null;
      const hero = game.actors.find(a => a.alive && a.hero && (!role || a.role === role));
      if (!hero) return null;
      selectedActor = hero;
      viewMode = 'actor';
      render(map);
      return { role: hero.role, level: hero.level, str: hero.str, dex: hero.dex, con: hero.con };
    },
    setSeason(s) {
      if (game) game.season = s;
      if (game && viewMode === 'world') render(map);
      return game ? game.season : null;
    },
    // Debug helper for the preview: stop auto-advance, optionally set the
    // season, and reveal the whole map (discovered + visible) so terrain
    // colors can be inspected across the board, then render.
    previewReveal(season) {
      if (!game) return null;
      if (season) game.season = season;
      game.discovered.fill(1);
      game.visible.fill(1);
      game.discoveredTotal = COLS * ROWS;
      viewMode = 'world';
      render(map);
      return game.season;
    },
  };

  document.getElementById('reroll').addEventListener('click', reroll);

  if ('serviceWorker' in navigator) {
    // When a freshly activated SW takes control, reload once so the visible
    // page swaps to the new app shell instead of staying on the old DOM.
    // Skip the first-ever install (no prior controller → nothing is stale).
    const hadController = !!navigator.serviceWorker.controller;
    let swReloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (swReloading || !hadController) return;
      swReloading = true;
      window.location.reload();
    });
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  renderLegend();
  startGame(Math.floor(Math.random() * 0x7fffffff), { render: true });
})();
</script>
</body>
